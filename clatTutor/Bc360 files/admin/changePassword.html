<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Change Password | BC360</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
  <style>
    :root {
      --primary: #3A1C71;
      --primary-dark: #512da8;
      --sidebar-gradient: linear-gradient(180deg, #0F2027, #203A43, #2C5364);
      --card-bg: #fff;
      --bg-color: #f0f2f7;
      --input-bg: #f8fafc;
      --border: #e9eaf1;
      --danger: #FF6B6B;
      --button-blue: #23384e;
      --button-blue-hover: #0e2233;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-color);
      color: #333;
      height: 100vh;
      width: 100vw;
      overflow-x: hidden;
    }
    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: var(--sidebar-gradient);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      height: 100vh;
      z-index: 2000;
      box-shadow: 2px 0 16px 0 rgba(32,40,84,0.04);
      overflow-y: auto;
      max-height: 100vh;
      transition: left 0.3s;
    }
    .sidebar .brand {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 30px 0 16px 16px;
      transition: transform 0.2s ease;
    }
    .sidebar .brand:hover {
      transform: translateX(5px);
    }
    .sidebar .brand i {
      font-size: 1.3rem; 
      margin-right: 10px;
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .sidebar .brand:hover i {
      transform: scale(1.1);
      color: #fff;
    }
    .sidebar ul { list-style: none; }
    .sidebar ul li { margin: 20px 0; }
    .sidebar ul li a {
      color: #fff;
      font-size: 1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 10px 10px 10px 22px;
      border-radius: 4px;
      transition: all 0.22s ease;
      position: relative;
      overflow: hidden;
    }
    .sidebar ul li a::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
      transition: width 0.3s ease;
    }
    .sidebar ul li a:hover::before {
      width: 100%;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a.active { 
      background: rgba(255,255,255,0.15);
      transform: translateX(5px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .sidebar ul li a i { 
      margin-right: 10px; 
      font-size: 1.3rem; 
      width: 25px; 
      text-align: center;
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .sidebar ul li a:hover i {
      transform: scale(1.1);
      color: #fff;
    }
    /* PNG Icon Styling for Sidebar */
    .sidebar ul li a img.sidebar-icon {
      margin-right: 10px;
      width: 25px;
      height: 25px;
      object-fit: contain;
      transition: transform 0.2s ease;
    }
    .sidebar ul li a:hover img.sidebar-icon {

    }
    .sidebar .brand img.sidebar-icon {
      margin-right: 8px;
      width: 20px;
      height: 20px;
      object-fit: contain;
    }
    .sidebar ul li a .fa-trophy { color: #FFD700; }
    .sidebar .logout {
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 20px;
      margin-bottom: 20px;
      padding-left: 10px;
    }
    .sidebar .logout a {
      color: #fff;
      font-size: 1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px 10px 22px;
      border-radius: 4px;
      transition: all 0.22s ease;
      position: relative;
      overflow: hidden;
    }
    .sidebar .logout a::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
      transition: width 0.3s ease;
    }
    .sidebar .logout a:hover::before {
      width: 100%;
    }
    .sidebar .logout a:hover { 
      background: rgba(255,255,255,0.15);
      transform: translateX(5px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);

    @media (max-width: 991px) {
      .sidebar {
        left: -260px;
        position: fixed;

        z-index: 2002;

    /* Overlay for sidebar */
    .sidebar-overlay {
      display: none;

    /* TOP BAR */
    .top-bar {
      display: flex;

      justify-content: flex-end;

      top: 0;
      left: 0;

    #menuToggle.menu-open .fa-bars { display: none; }
    #menuToggle.menu-open .fa-times { display: inline; }
    @media (max-width: 991px) {
      #menuToggle { display: inline-block;}
      .top-bar { pointer-events: auto;}
    }
@media (max-width: 991px) {
  .top-bar {
    position: relative;        /* Needed if not already set */

    /* ---- MAIN CONTENT: FLEX CENTER ----- */

    }

      font-size: 2.25rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin: 0;
      line-height: 1.13;
    }
    .change-password-label {
      margin: 35px 0 18px 0;
      font-weight: 700;
      font-size: 1.25rem;
      color: #23384e;
    }
    /* Password Form Fields */
    .cp-form-group {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1.7px solid var(--border);
      border-radius: 10px;
      margin-bottom: 18px;
      padding-right: 8px;
      transition: border 0.2s;
    }

    .cp-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 1.18rem;
      padding: 15px 14px;
      border-radius: 10px;
      color: #4a4066;
      font-family: inherit;
      font-weight: 500;
    }
    .cp-eye {
      color: #747687;
      font-size: 1.17rem;
      cursor: pointer;
      margin-left: 2px;
      transition: color 0.17s;
    }
    .cp-eye:hover {color: var(--primary);}
    /* Buttons */
    .cp-btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 18px;
      margin-top: 24px;
    }
    .cp-btn {
      font-family: inherit;
      font-size: 1.16rem;
      font-weight: 600;
      padding: 11px 36px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 8px #dbe5f4a2;
      transition: background 0.18s, color 0.18s, transform 0.11s;

      outline: none;
    }
    .cp-btn-reset {
      background: var(--button-blue);
      color: #fff;
    }
    .cp-btn-reset:hover {background: var(--button-blue-hover);}
    .cp-btn-save {
      background: var(--danger);
      color: #fff;
    }
    .cp-btn-save:hover {
      background: #fa5252;
      color: #fff;
      transform: translateY(-2px) scale(1.03);
    }
    @media (max-width: 400px) {
      .change-password-header h2 {font-size: 1.2rem;}
      .change-password-container {padding: 15px 2vw;}
      .cp-btn {font-size: 0.98rem; padding: 10px 12px;}
    }
    /* Hide sidebar when overlay is active on mobile */
    @media (max-width: 991px) {
      body.sidebar-open {
        overflow: hidden;
      }
    }
  </style>

  <script>
    // Hamburger toggle logic
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    let menuOpen = false;
    function openSidebar() {
      menuOpen = true;
      sidebar.classList.add('open');
      menuToggle.classList.add('menu-open');
      sidebarOverlay.classList.add('active');
      document.body.classList.add('sidebar-open');
    }
    function closeSidebar() {
      menuOpen = false;
      sidebar.classList.remove('open');
      menuToggle.classList.remove('menu-open');
      sidebarOverlay.classList.remove('active');
      document.body.classList.remove('sidebar-open');
    }
    menuToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!menuOpen) openSidebar();
      else closeSidebar();
    });
    sidebarOverlay.addEventListener('click', function() {
      closeSidebar();
    });
    // Hide sidebar if resize to desktop
    window.addEventListener('resize', function() {
      if (window.innerWidth > 991 && menuOpen) closeSidebar();
    });
    // Hide sidebar if click link in sidebar on mobile
    sidebar.querySelectorAll('a').forEach(a=>{
      a.onclick=()=>{ if(window.innerWidth<=991) closeSidebar(); }
    });

    // Password eye toggle logic
    document.querySelectorAll('.cp-eye').forEach(eye => {
      eye.addEventListener('click', function () {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (input.type === 'password') {
          input.type = 'text';
          this.classList.remove('fa-eye');
          this.classList.add('fa-eye-slash');
        } else {
          input.type = 'password';
          this.classList.remove('fa-eye-slash');
          this.classList.add('fa-eye');
        }
      });
    });

    // Reset functionality
    document.getElementById('resetBtn').addEventListener('click', function (e) {
      e.preventDefault(); // Prevent form submission
      
      // Clear all form fields
      document.getElementById('oldPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      
      // Reset all inputs to password type
      document.querySelectorAll('.cp-input').forEach(input => {
        input.type = 'password';
      });
      
      // Reset all eye icons to show password state
      document.querySelectorAll('.cp-eye').forEach(eye => {
        eye.classList.remove('fa-eye-slash');
        eye.classList.add('fa-eye');
      });
      
      // Focus on the first input
      document.getElementById('oldPassword').focus();
      
      console.log('✅ Form reset successfully');
    });

    // API Configuration
    const ADMIN_API_URL = 'https://fowh69kcfd.execute-api.ap-south-1.amazonaws.com/dev/admin';
    const COLLEGE_API_URL = 'https://fowh69kcfd.execute-api.ap-south-1.amazonaws.com/dev/addCollege';
    const PASSWORD_CHANGE_EMAIL_API = 'https://9vgcxcrvdi.execute-api.ap-south-1.amazonaws.com/dev/password-change';
    
    // Custom Popup Styles
    const popupStyles = `
      .popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
      }
      
      .popup-overlay.show {
        opacity: 1;
        visibility: visible;
      }
      
      .popup {
        background: #fff;
        border-radius: 20px;
        padding: 40px;
        max-width: 450px;
        width: 90%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        transform: scale(0.7) translateY(50px);
        transition: transform 0.3s ease;
        position: relative;
        border: 2px solid #edeaff;
      }
      
      .popup-overlay.show .popup {
        transform: scale(1) translateY(0);
      }
      
      .popup-icon {
        font-size: 4rem;
        margin-bottom: 20px;
        display: block;
      }
      
      .popup-icon.success {
        color: #10b981;
      }
      
      .popup-icon.error {
        color: #ef4444;
      }
      
      .popup-icon.warning {
        color: #f59e0b;
      }
      
      .popup-icon.info {
        color: #3b82f6;
      }
      
      .popup-title {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 15px;
        color: #1e293b;
      }
      
      .popup-message {
        font-size: 1.1rem;
        color: #64748b;
        margin-bottom: 30px;
        line-height: 1.6;
      }
      
      .popup-btn {
        background: #ef4444;
        color: #fff;
        border: none;
        padding: 14px 35px;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
        box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
      }
      
      .popup-btn:hover {
        background: #dc2626;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
      }
      
      .popup-btn.success {
        background: #10b981;
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
      }
      
      .popup-btn.success:hover {
        background: #059669;
        box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
      }
      
      .popup-btn.info {
        background: #3b82f6;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      }
      
      .popup-btn.info:hover {
        background: #2563eb;
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
      }
    `;
    
    // Add popup styles to head
    const styleSheet = document.createElement('style');
    styleSheet.textContent = popupStyles;
    document.head.appendChild(styleSheet);
    
    // Add popup HTML
    const popupHTML = `
      <div class="popup-overlay" id="popupOverlay">
        <div class="popup" id="popup">
          <div class="popup-icon" id="popupIcon">
            <i class="fas fa-check-circle"></i>
          </div>
          <div class="popup-title" id="popupTitle">Success!</div>
          <div class="popup-message" id="popupMessage">Your password has been changed successfully.</div>
          <button class="popup-btn" id="popupBtn">OK</button>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', popupHTML);
    
    // Custom Popup Functions
    function showPopup(type, title, message) {
      const popupOverlay = document.getElementById('popupOverlay');
      const popupIcon = document.getElementById('popupIcon');
      const popupTitle = document.getElementById('popupTitle');
      const popupMessage = document.getElementById('popupMessage');
      const popupBtn = document.getElementById('popupBtn');
      
      // Set icon based on type
      popupIcon.className = 'popup-icon ' + type;
      if (type === 'success') {
        popupIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
        popupBtn.className = 'popup-btn success';
      } else if (type === 'error') {
        popupIcon.innerHTML = '<i class="fas fa-exclamation-circle"></i>';
        popupBtn.className = 'popup-btn';
      } else if (type === 'warning') {
        popupIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
        popupBtn.className = 'popup-btn';
      } else if (type === 'info') {
        popupIcon.innerHTML = '<i class="fas fa-info-circle"></i>';
        popupBtn.className = 'popup-btn info';
      }
      
      popupTitle.textContent = title;
      popupMessage.textContent = message;
      
      popupOverlay.classList.add('show');
      
      // Close popup when clicking OK button
      popupBtn.onclick = function() {
        popupOverlay.classList.remove('show');
      };
      
      // Close popup when clicking overlay (only for non-loading popups)
      if (type !== 'info') {
        popupOverlay.onclick = function(e) {
          if (e.target === popupOverlay) {
            popupOverlay.classList.remove('show');
          }
        };
      } else {
        // For info popups, remove click handler to prevent accidental closing
        popupOverlay.onclick = null;
      }
      
      // Auto close success popup after 3 seconds
      if (type === 'success') {
        setTimeout(() => {
          popupOverlay.classList.remove('show');
        }, 3000);
      }
    }
    
    // Form validation function
    function validateForm(oldPass, newPass, confirmPass) {
      // Check for empty fields
      if (!oldPass) {
        showPopup('error', 'Validation Error', 'Please enter your old password.');
        return false;
      }
      if (!newPass) {
        showPopup('error', 'Validation Error', 'Please enter a new password.');
        return false;
      }
      if (!confirmPass) {
        showPopup('error', 'Validation Error', 'Please confirm your new password.');
        return false;
      }
      
      // Check password match
      if (newPass !== confirmPass) {
        showPopup('error', 'Password Mismatch', 'New Password and Confirm Password do not match!');
        return false;
      }
      
      // Check if new password is different from old password
      if (oldPass === newPass) {
        showPopup('warning', 'Invalid Password', 'New password cannot be the same as old password!');
        return false;
      }
      
      // Check password length
      if (newPass.length < 6) {
        showPopup('error', 'Password Too Short', 'New password must be at least 6 characters long!');
        return false;
      }
      
      return true;
    }
    
    // Function to verify old password against API
    async function verifyOldPassword(adminId, oldPassword) {
      try {
        const response = await fetch(ADMIN_API_URL, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
          },
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        if (data.success && data.admins) {
          // Find the admin with matching admin_id
          const admin = data.admins.find(a => a.admin_id == adminId);
          
          if (admin) {
            // Check if old password matches
            return admin.password === oldPassword;
          } else {
            showPopup('error', 'Admin Not Found', 'Admin ID not found in the system.');
            return false;
          }
        } else {
          showPopup('error', 'API Error', 'Failed to fetch admin data.');
          return false;
        }
      } catch (error) {
        console.error('Error verifying old password:', error);
        showPopup('error', 'Connection Error', 'Failed to connect to server. Please try again.');
        return false;
      }
    }
    
    // Function to get college data by admin_id
    async function getCollegeData(adminId) {
      try {
        console.log('🔍 Fetching college data for admin_id:', adminId);
        
        const response = await fetch(COLLEGE_API_URL, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
          },
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('📊 College API Response:', data);
        
        if (data.success && data.colleges) {
          // Find the college with matching admin_id
          const college = data.colleges.find(c => c.admin_id == adminId);
          
          if (college) {
            console.log('✅ College found:', college);
            return {
              email: college.email,
              headName: college.head_name
            };
          } else {
            console.log('❌ College not found for admin_id:', adminId);
            return null;
          }
        } else {
          console.log('❌ Failed to fetch college data');
          return null;
        }
      } catch (error) {
        console.error('❌ Error fetching college data:', error);
        return null;
      }
    }
    
    // Function to send password change notification email
    async function sendPasswordChangeEmail(recipientEmail, recipientName) {
      try {
        console.log('📧 Sending password change notification email...');
        
        // Get current date and time
        const now = new Date();
        const changeDate = now.toLocaleString('en-US', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        }).replace(/(\d+)\/(\d+)\/(\d+),?\s*(\d+):(\d+):(\d+)/, '$3-$1-$2 $4:$5:$6');
        
        const emailData = {
          recipientEmail: recipientEmail,
          recipientName: recipientName,
          changeDate: changeDate
        };
        
        console.log('📧 Email data:', emailData);
        
        const response = await fetch(PASSWORD_CHANGE_EMAIL_API, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(emailData)
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('✅ Password change email sent successfully:', data);
        
        if (data.success) {
          return true;
        } else {
          throw new Error(data.message || 'Email sending failed');
        }
        
      } catch (error) {
        console.error('❌ Error sending password change email:', error);
        return false;
      }
    }
    
    // Function to update password via API
    async function updatePassword(adminId, newPassword) {
      try {
        console.log('🔄 Updating password for admin_id:', adminId);
        
        const response = await fetch(ADMIN_API_URL, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            admin_id: adminId,
            password: newPassword
          })
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('✅ Password updated successfully:', data);
        
        if (data.success) {
          return true;
        } else {
          throw new Error(data.message || 'Update failed');
        }
        
      } catch (error) {
        console.error('❌ Error updating password:', error);
        
        // If API update fails, show specific error message
        if (error.message.includes('404')) {
          showPopup('error', 'Admin Not Found', 'Admin ID not found in the system.');
        } else if (error.message.includes('500')) {
          showPopup('error', 'Server Error', 'Server error occurred. Please try again later.');
        } else {
          showPopup('error', 'Update Failed', error.message || 'Failed to update password. Please try again.');
        }
        
        return false;
      }
    }
    
    // Form submission
    document.getElementById('changePasswordForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      
      const oldPass = document.getElementById('oldPassword').value.trim();
      const newPass = document.getElementById('newPassword').value.trim();
      const confirmPass = document.getElementById('confirmPassword').value.trim();
      
      // Validate form
      if (!validateForm(oldPass, newPass, confirmPass)) {
        return;
      }
      
      // Get current admin_id from auth session
      let currentAdminId = null;
      if (window.UserSession) {
        const userData = window.UserSession.getUserData();
        console.log('🔍 Form submission - UserData:', userData); // Debug log
        
        // Check if userData exists and has admin_id (prioritize admin_id over userId)
        if (userData && (userData.admin_id || (userData.user && userData.user.admin_id))) {
          currentAdminId = userData.admin_id || userData.user?.admin_id;
          console.log('✅ Using admin_id:', currentAdminId); // Debug log
        } else {
          console.log('❌ Admin ID not found in userData:', userData); // Debug log
          showPopup('error', 'Authentication Error', 'Admin ID not found in session. Please login again.');
          return;
        }
      } else {
        console.log('❌ UserSession not available'); // Debug log
        showPopup('error', 'Authentication Error', 'User session not available. Please login again.');
        return;
      }
      
      // Show loading popup
      showPopup('info', 'Verifying...', 'Please wait while we verify your old password.');
      
      try {
        // Verify old password
        const isOldPasswordValid = await verifyOldPassword(currentAdminId, oldPass);
        
        if (!isOldPasswordValid) {
          showPopup('error', 'Invalid Password', 'The old password you entered is incorrect.');
          return;
        }
        
        // Update password
        showPopup('info', 'Updating...', 'Please wait while we update your password.');
        
        const updateSuccess = await updatePassword(currentAdminId, newPass);
        
        if (updateSuccess) {
          // Show simple success message
          showPopup('success', 'Success!', 'Your password has been changed successfully.');
          
          // Send password change notification email silently in background
          const collegeData = await getCollegeData(currentAdminId);
          if (collegeData && collegeData.email && collegeData.headName) {
            // Send email notification silently (no user feedback)
            sendPasswordChangeEmail(collegeData.email, collegeData.headName).catch(error => {
              console.log('Email notification failed silently:', error);
            });
          }
          
          // Reset form
          document.getElementById('changePasswordForm').reset();
          document.querySelectorAll('.cp-input').forEach(input => input.type = 'password');
          document.querySelectorAll('.cp-eye').forEach(eye => {
            eye.classList.add('fa-eye');
            eye.classList.remove('fa-eye-slash');
          });
        } else {
          showPopup('error', 'Update Failed', 'Failed to update password. Please try again.');
        }
        
      } catch (error) {
        console.error('Error in password change process:', error);
        showPopup('error', 'Error', 'An unexpected error occurred. Please try again.');
      }
    });
  </script>

  <!-- Include the authentication system -->
  <script src="../js/user-session.js"></script>
  <script src="../js/professional-logout.js"></script>
  
  <script>
    // Authentication check and user tracking
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for auth system to load
      setTimeout(() => {
        if (window.UserSession) {
          const userData = window.UserSession.getUserData();
          if (userData && userData.isAuthenticated) {
            // 🛡️ SECURITY CHECK: Verify user is actually an admin
            if (userData.userType !== 'admin') {
              console.log('❌ UNAUTHORIZED ACCESS DENIED:', userData.userType, 'trying to access admin module');
              console.log('🚨 Security Alert: User', userData.displayName, 'with role', userData.userType, 'attempted to access admin-only content');
              
              // Show security alert
              alert(`🚫 Access Denied!\n\nThis module is restricted to administrators only.\nYour current role: ${userData.userType}\n\nYou will be redirected to the login page.`);
              
              // Clear potentially compromised session
              window.UserSession.clearUserData();
              
              // Redirect to login
              window.location.href = '../login.html';
              return;
            }
            
            console.log('✅ User authenticated:', userData.displayName, '(' + userData.userType + ')');
            
            // Update user info in UI if elements exist
            const userNameElements = document.querySelectorAll('.user-name, .user-display-name');
            userNameElements.forEach(element => {
              element.textContent = userData.displayName;
            });
            
            const userTypeElements = document.querySelectorAll('.user-type, .user-role');
            userTypeElements.forEach(element => {
              element.textContent = userData.userType.charAt(0).toUpperCase() + userData.userType.slice(1);
            });
            
            const userIdElements = document.querySelectorAll('.user-id');
            userIdElements.forEach(element => {
              element.textContent = userData.userId;
            });
          } else {
            // Redirect to login if no user
            console.log('❌ No authenticated user found, redirecting to login');
            window.location.href = '../login.html';
          }
        } else {
          console.log('❌ UserSession not loaded');
          window.location.href = '../login.html';
        }
      }, 100);
    });

    // Professional logout functionality for admins
    function logout() {
      if (window.professionalLogout) {
        window.professionalLogout.triggerLogout();
      } else {
        // Fallback implementation
        if (confirm('Are you sure you want to log out?')) {
          if (window.UserSession) {
            window.UserSession.logout();
          } else {
            localStorage.removeItem('bc3620_user');
            localStorage.removeItem('bc3620_userType');
            localStorage.removeItem('bc3620_loginTime');
          }
          window.location.href = '../login.html';
        }
      }
    }

    // Add logout event listeners to any logout buttons
    document.addEventListener('DOMContentLoaded', function() {
      const logoutButtons = document.querySelectorAll('.logout-btn, .logout-button, [onclick*="logout"]');
      logoutButtons.forEach(button => {
        button.addEventListener('click', function(e) {
          e.preventDefault();
          logout();
        });
      });
    });
  </script>
