<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width"/>
  <title>BC360 - Quiz Ladder Challenge</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent: #fbbf24;
      --accent-light: #1a1a1a;
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #404040;
      --label: #ffffff;
      --input: #e5e5e5;
      --subtle: #a0a0a0;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --blue: #3b82f6;
      --green: #10b981;
      --lime: #84cc16;
      --purple: #8b5cf6;
      --radius: 13px;
      --shadow: 0 1.5px 10px #1d264015;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #2d2d2d 100%);
      min-height: 100vh;
      width: 100vw;
      color: var(--input);
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    .game-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: var(--card);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .back-button {
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-button:hover {
      background: #f59e0b;
      transform: translateY(-2px);
    }

    .game-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      flex: 1;
    }

    .game-info {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--label);
    }

    .score-display {
      font-weight: 600;
      color: var(--accent);
    }

    .lives-display {
      font-weight: 600;
      color: var(--danger);
    }

    .ladder-container {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .ladder {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .ladder-step {
      width: 300px;
      height: 60px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--subtle);
      transition: all 0.3s ease;
      position: relative;
    }

    .ladder-step.current {
      border-color: var(--accent);
      background: rgba(251, 191, 36, 0.1);
      color: var(--accent);
    }

    .ladder-step.completed {
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
    }

    .ladder-step.failed {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
    }

    .ladder-step::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 100%;
      width: 4px;
      height: 10px;
      background: var(--border);
      transform: translateX(-50%);
    }

    .ladder-step:last-child::before {
      display: none;
    }

    .question-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      margin-bottom: 30px;
      text-align: center;
    }

    .question-number {
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 20px;
      font-weight: 600;
    }

    .question-text {
      font-size: 1.5rem;
      color: var(--label);
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .options-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .option-button {
      background: var(--accent-light);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      font-size: 1.1rem;
      color: var(--label);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }

    .option-button:hover {
      border-color: var(--accent);
      background: rgba(251, 191, 36, 0.1);
      transform: translateY(-2px);
    }

    .option-button.correct {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .option-button.incorrect {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
    }

    .option-button.selected {
      border-color: var(--accent);
      background: rgba(251, 191, 36, 0.2);
    }

    .feedback-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      display: none;
    }

    .feedback-message.success {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .feedback-message.error {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .next-button {
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      margin-top: 20px;
    }

    .next-button:hover {
      background: #f59e0b;
      transform: translateY(-2px);
    }

    .next-button:disabled {
      background: var(--border);
      color: var(--subtle);
      cursor: not-allowed;
      transform: none;
    }

    .game-over-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .game-over-modal.show {
      opacity: 1;
      visibility: visible;
    }

    .game-over-content {
      background: var(--card);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      border: 1px solid var(--border);
      transform: scale(0.8);
      transition: transform 0.3s ease;
    }

    .game-over-modal.show .game-over-content {
      transform: scale(1);
    }

    .game-over-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .game-over-icon.fail {
      color: var(--danger);
    }

    .game-over-icon.success {
      color: var(--success);
    }

    .game-over-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .game-over-title.fail {
      color: var(--danger);
    }

    .game-over-title.success {
      color: var(--success);
    }

    .game-over-message {
      color: var(--label);
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .game-over-button {
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 0 10px;
    }

    .game-over-button:hover {
      background: #f59e0b;
      transform: translateY(-2px);
    }

    .game-over-button.secondary {
      background: var(--border);
      color: var(--label);
    }

    .game-over-button.secondary:hover {
      background: var(--subtle);
    }

    @media (max-width: 768px) {
      .game-header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }
      
      .game-info {
        justify-content: center;
      }
      
      .options-container {
        grid-template-columns: 1fr;
      }
      
      .ladder-step {
        width: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <button class="back-button" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
        Back to Games
      </button>
      <h1 class="game-title">🪜 Quiz Ladder Challenge</h1>
      <div class="game-info">
        <span class="score-display">Score: <span id="score">0</span></span>
        <span class="lives-display">Lives: <span id="lives">3</span> ❤️</span>
      </div>
    </div>

    <div class="ladder-container">
      <div class="ladder" id="ladder">
        <!-- Ladder steps will be generated by JavaScript -->
      </div>
    </div>

    <div class="question-container">
      <div class="question-number" id="questionNumber">Question 1 of 10</div>
      <div class="question-text" id="questionText">
        Click "Start Challenge" to begin climbing the ladder!
      </div>
      <div class="options-container" id="optionsContainer">
        <!-- Options will be generated by JavaScript -->
      </div>
      <div class="feedback-message" id="feedbackMessage"></div>
      <button class="next-button" id="nextButton" onclick="nextQuestion()" disabled>
        Start Challenge
      </button>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div class="game-over-modal" id="gameOverModal">
    <div class="game-over-content">
      <div class="game-over-icon" id="gameOverIcon">😔</div>
      <h2 class="game-over-title" id="gameOverTitle">Game Over</h2>
      <p class="game-over-message" id="gameOverMessage">
        You've run out of lives. Better luck next time!
      </p>
      <div>
        <button class="game-over-button" onclick="restartGame()">
          Try Again
        </button>
        <button class="game-over-button secondary" onclick="goBack()">
          Back to Games
        </button>
      </div>
    </div>
  </div>

  <script>
    // Game data
    const gameData = {
      currentStep: 0,
      score: 0,
      lives: 3,
      questions: [
        {
          question: "What is 2 + 2?",
          options: ["3", "4", "5", "6"],
          correct: 1
        },
        {
          question: "Which planet is closest to the Sun?",
          options: ["Venus", "Mars", "Mercury", "Earth"],
          correct: 2
        },
        {
          question: "What is the capital of Japan?",
          options: ["Seoul", "Beijing", "Tokyo", "Bangkok"],
          correct: 2
        },
        {
          question: "What is the chemical symbol for oxygen?",
          options: ["Ox", "O", "O2", "Ox2"],
          correct: 1
        },
        {
          question: "Who wrote 'Romeo and Juliet'?",
          options: ["Charles Dickens", "William Shakespeare", "Jane Austen", "Mark Twain"],
          correct: 1
        },
        {
          question: "What is the square root of 144?",
          options: ["10", "11", "12", "13"],
          correct: 2
        },
        {
          question: "Which year did World War II end?",
          options: ["1943", "1944", "1945", "1946"],
          correct: 2
        },
        {
          question: "What is the largest ocean on Earth?",
          options: ["Atlantic", "Indian", "Arctic", "Pacific"],
          correct: 3
        },
        {
          question: "What is the chemical formula for water?",
          options: ["CO₂", "H₂O", "O₂", "N₂"],
          correct: 1
        },
        {
          question: "Who was the first President of the United States?",
          options: ["Thomas Jefferson", "John Adams", "George Washington", "Benjamin Franklin"],
          correct: 2
        }
      ]
    };

    let currentQuestion = null;
    let selectedAnswer = null;

    // Initialize the game
    function initGame() {
      renderLadder();
      updateDisplay();
    }

    // Render ladder
    function renderLadder() {
      const ladder = document.getElementById('ladder');
      ladder.innerHTML = '';
      
      for (let i = 9; i >= 0; i--) {
        const step = document.createElement('div');
        step.className = 'ladder-step';
        step.textContent = `Step ${i + 1}`;
        
        if (i === gameData.currentStep) {
          step.classList.add('current');
        } else if (i < gameData.currentStep) {
          step.classList.add('completed');
        }
        
        ladder.appendChild(step);
      }
    }

    // Update display
    function updateDisplay() {
      document.getElementById('score').textContent = gameData.score;
      document.getElementById('lives').textContent = gameData.lives;
      document.getElementById('questionNumber').textContent = `Question ${gameData.currentStep + 1} of 10`;
    }

    // Start challenge
    function startChallenge() {
      if (gameData.currentStep < gameData.questions.length) {
        currentQuestion = gameData.questions[gameData.currentStep];
        displayQuestion(currentQuestion);
      }
    }

    // Display question
    function displayQuestion(question) {
      const questionText = document.getElementById('questionText');
      const optionsContainer = document.getElementById('optionsContainer');
      const nextButton = document.getElementById('nextButton');
      const feedbackMessage = document.getElementById('feedbackMessage');

      questionText.textContent = question.question;
      feedbackMessage.style.display = 'none';
      nextButton.disabled = true;
      nextButton.textContent = 'Submit Answer';
      selectedAnswer = null;

      optionsContainer.innerHTML = '';
      question.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.className = 'option-button';
        button.textContent = option;
        button.onclick = () => selectAnswer(index);
        optionsContainer.appendChild(button);
      });
    }

    // Select answer
    function selectAnswer(answerIndex) {
      selectedAnswer = answerIndex;
      const buttons = document.querySelectorAll('.option-button');
      const feedbackMessage = document.getElementById('feedbackMessage');
      const nextButton = document.getElementById('nextButton');

      buttons.forEach((button, index) => {
        button.classList.remove('selected', 'correct', 'incorrect');
        if (index === answerIndex) {
          button.classList.add('selected');
        }
        if (index === currentQuestion.correct) {
          button.classList.add('correct');
        } else if (index === answerIndex && answerIndex !== currentQuestion.correct) {
          button.classList.add('incorrect');
        }
      });

      if (answerIndex === currentQuestion.correct) {
        feedbackMessage.textContent = '✅ Correct! Well done!';
        feedbackMessage.className = 'feedback-message success';
        gameData.score += (gameData.currentStep + 1) * 10;
      } else {
        feedbackMessage.textContent = `❌ Incorrect. The correct answer is: ${currentQuestion.options[currentQuestion.correct]}`;
        feedbackMessage.className = 'feedback-message error';
        gameData.lives--;
      }

      feedbackMessage.style.display = 'block';
      nextButton.disabled = false;
      updateDisplay();
    }

    // Next question
    function nextQuestion() {
      if (gameData.currentStep === 0 && selectedAnswer === null) {
        // Start the challenge
        startChallenge();
        return;
      }

      if (selectedAnswer === null) {
        return; // No answer selected
      }

      if (selectedAnswer === currentQuestion.correct) {
        // Correct answer - move to next step
        gameData.currentStep++;
        
        if (gameData.currentStep >= gameData.questions.length) {
          // Game completed
          showGameOver(true);
          return;
        }
        
        // Move to next question
        currentQuestion = gameData.questions[gameData.currentStep];
        displayQuestion(currentQuestion);
      } else {
        // Wrong answer - lose a life
        gameData.lives--;
        
        if (gameData.lives <= 0) {
          // Game over
          showGameOver(false);
          return;
        }
        
        // Continue with same question but reset the display
        displayQuestion(currentQuestion);
      }

      renderLadder();
      updateDisplay();
    }

    // Show game over
    function showGameOver(won) {
      const modal = document.getElementById('gameOverModal');
      const icon = document.getElementById('gameOverIcon');
      const title = document.getElementById('gameOverTitle');
      const message = document.getElementById('gameOverMessage');

      if (won) {
        icon.textContent = '🎉';
        icon.className = 'game-over-icon success';
        title.textContent = 'Congratulations!';
        title.className = 'game-over-title success';
        message.textContent = `You've successfully climbed the ladder! Final score: ${gameData.score} points.`;
      } else {
        icon.textContent = '😔';
        icon.className = 'game-over-icon fail';
        title.textContent = 'Game Over';
        title.className = 'game-over-title fail';
        message.textContent = `You've run out of lives. Final score: ${gameData.score} points. Better luck next time!`;
      }

      modal.classList.add('show');
    }

    // Restart game
    function restartGame() {
      gameData.currentStep = 0;
      gameData.score = 0;
      gameData.lives = 3;
      selectedAnswer = null;
      currentQuestion = null;
      
      document.getElementById('gameOverModal').classList.remove('show');
      document.getElementById('nextButton').textContent = 'Start Challenge';
      document.getElementById('questionText').textContent = 'Click "Start Challenge" to begin climbing the ladder!';
      document.getElementById('optionsContainer').innerHTML = '';
      document.getElementById('feedbackMessage').style.display = 'none';
      
      renderLadder();
      updateDisplay();
    }

    // Go back to games hub
    function goBack() {
      window.location.href = './games.html';
    }

    // Initialize the game when page loads
    document.addEventListener('DOMContentLoaded', initGame);
  </script>

  <!-- Include the authentication system -->
  <script src="../js/user-session.js"></script>
  
  <script>
    // Authentication check and user tracking
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for auth system to load
      setTimeout(() => {
        if (window.UserSession) {
          const userData = window.UserSession.getUserData();
          if (userData && userData.isAuthenticated) {
            // 🛡️ SECURITY CHECK: Verify user is actually a student
            if (userData.userType !== 'student') {
              console.log('❌ UNAUTHORIZED ACCESS DENIED:', userData.userType, 'trying to access student module');
              console.log('🚨 Security Alert: User', userData.displayName, 'with role', userData.userType, 'attempted to access student-only content');
              
              // Show security alert
              alert(`🚫 Access Denied!\n\nThis module is restricted to students only.\nYour current role: ${userData.userType}\n\nYou will be redirected to the login page.`);
              
              // Clear potentially compromised session
              window.UserSession.clearUserData();
              
              // Redirect to login
              window.location.href = '../login.html';
              return;
            }
            
            console.log('✅ User authenticated:', userData.displayName, '(' + userData.userType + ')');
            
            // Update user info in UI if elements exist
            const userNameElements = document.querySelectorAll('.user-name, .user-display-name');
            userNameElements.forEach(element => {
              element.textContent = userData.displayName;
            });
            
            const userTypeElements = document.querySelectorAll('.user-type, .user-role');
            userTypeElements.forEach(element => {
              element.textContent = userData.userType.charAt(0).toUpperCase() + userData.userType.slice(1);
            });
            
            const userIdElements = document.querySelectorAll('.user-id');
            userIdElements.forEach(element => {
              element.textContent = userData.userId;
            });
          } else {
            // Redirect to login if no user
            console.log('❌ No authenticated user found, redirecting to login');
            window.location.href = '../login.html';
          }
        } else {
          console.log('❌ UserSession not loaded');
          window.location.href = '../login.html';
        }
      }, 100);
    });

    // Logout functionality
    function logout() {
      if (window.UserSession) {
        window.UserSession.logout();
      } else {
        // Fallback logout
        localStorage.removeItem('bc3620_user');
        localStorage.removeItem('bc3620_userType');
        localStorage.removeItem('bc3620_loginTime');
        // Redirect to login page
        window.location.href = '../login.html';
      }
    }

    // Add logout event listeners to any logout buttons
    document.addEventListener('DOMContentLoaded', function() {
      const logoutButtons = document.querySelectorAll('.logout-btn, .logout-button, [onclick*="logout"]');
      logoutButtons.forEach(button => {
        button.addEventListener('click', function(e) {
          e.preventDefault();
          logout();
        });
      });
    });
  </script>
</body>

      logoutButtons.forEach(button => {
        button.addEventListener('click', function(e) {
          e.preventDefault();
          logout();
        });
      });
    });
  </script>
</body>
