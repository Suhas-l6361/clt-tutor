<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width"/>
  <title>BC360 - Parent Gallery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sidebar1: #2c5530;
      --sidebar2: #4a7c59;
      --sidebar-shadow: 0 4px 26px #1d26401c;
      --sidebar-width: 245px;
      --accent: #e67e22;
      --accent-light: #f8f9fa;
      --bg: #f8f9fa;
      --card: #ffffff;
      --border: #e2e8f0;
      --label: #1e293b;
      --input: #334155;
      --subtle: #64748b;
      --error: #ef4444;
      --required: #f59e0b;
      --radius: 13px;
      --shadow: 0 1.5px 10px #1d264015;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --blue: #3b82f6;
      --red: #ef4444;
      --green: #10b981;
      --purple: #8b5cf6;
      --yellow: #fbbf24;
      --gallery-main: #ffffff;
      --gallery-card: #f8fafc;
      --gallery-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      --gallery-shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.15);
      --gallery-title: #1e293b;
      --gallery-date: #e67e22;
      --comment-bg: #f8fafc;
      --comment-border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 50%, #f1f5f9 100%);
      min-height: 100vh;
      width: 100vw;
      color: var(--input);
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(230, 126, 34, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(44, 85, 48, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(52, 152, 219, 0.05) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .app-flex { display: flex; flex-direction: row; min-height: 100vh; width: 100vw; }
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: linear-gradient(180deg, var(--sidebar1) 0%, var(--sidebar2) 100%);
      color: #fff; display: flex; flex-direction: column;
      justify-content: space-between; box-shadow: var(--sidebar-shadow); z-index: 10; height: 100vh; position: fixed; left: 0; top: 0;
      transition: left 0.28s; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #cce6ff #fff;
    }
    .sidebar::-webkit-scrollbar { width: 6px; background: #f1f5fc;}
    .sidebar::-webkit-scrollbar-thumb { background: #cce6ff; border-radius: 4px;}
    .sidebar .brand { display: flex; align-items: center; justify-content: center; padding: 10px 6px; transition: transform 0.2s; }
    .sidebar .brand img { width: 100%; height: 50px; border-radius: 3px; border: 1.5px solid #fff; background: #fff; object-fit: contain; box-shadow: 0 2px 5px #26bf6720; transition: transform 0.2s, box-shadow 0.2s; }
    .sidebar .brand:hover img { transform: scale(1.05); box-shadow: 0 4px 12px #26bf6740; }
    .sidebar hr { border: 0; border-top: 1.3px solid #ffffff22; margin: 0 12px 16px 12px; }
    .sidebar ul { list-style: none; padding: 0; margin: 0; }
    .sidebar ul li { margin: 0; }
    .sidebar ul li a { color: #fff; font-size: 1.06rem; text-decoration: none; display: flex; align-items: center; padding: 12px 10px 12px 24px; border-radius: 7px 0 0 7px; transition: all 0.22s; font-weight: 500; gap: 13px; position: relative; overflow: hidden; }
    .sidebar ul li a::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%); transition: width 0.3s; }
    .sidebar ul li a:hover::before { width: 100%; }
    .sidebar ul li a.active, .sidebar ul li a:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
    .sidebar .logout { border-top: 1px solid rgba(255,255,255,0.2); margin-top: 15px; padding: 24px 0 28px 10px;}
    .sidebar .logout a { color: #fff; font-size: 1.05rem; text-decoration: none; display: flex; align-items: center; gap: 11px; padding: 10px 12px 10px 24px; border-radius: 6px; transition: all 0.22s; position: relative; overflow: hidden; }
    .sidebar .logout a::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%); transition: width 0.3s; }
    .sidebar .logout a:hover::before { width: 100%; }
    .sidebar .logout a:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
    .sidebar-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      filter: none !important;
      -webkit-filter: none !important;
    }
    .main-content { margin-left: var(--sidebar-width); flex: 1; width: calc(100vw - var(--sidebar-width)); min-height: 100vh; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 0; transition: margin-left 0.28s; z-index: 1; }
    .top-bar { width: 100%; display: flex; align-items: center; justify-content: center; gap: 15px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1.3px solid var(--border); padding: 10px 32px 10px 32px; font-size: 1.32rem; font-weight: 700; letter-spacing: 0.01em; color: var(--accent); position: relative; z-index: 2; box-shadow: 0 2px 8px rgba(44, 85, 48, 0.1); }
    .top-bar .fa-images { font-size: 2.1rem; color: var(--accent);}
    .sidebar-hamburger { display: none; position: fixed; top: 18px; right: 19px; z-index: 9999; font-size: 2.1rem; background: #fff; color: var(--sidebar1); border: none; border-radius: 7px; padding: 6px 14px 7px 14px; box-shadow: 0 2px 12px rgba(44, 85, 48, 0.15); cursor: pointer; transition: all 0.3s ease;}
    .sidebar-hamburger.menu-open { background: var(--accent-light); color: var(--accent);}
    .sidebar-hamburger:hover { background: var(--accent-light); color: var(--accent); transform: scale(1.05);}
    .sidebar-hamburger .fa-times { display: none;}
    .sidebar-hamburger.menu-open .fa-bars { display: none;}
    .sidebar-hamburger.menu-open .fa-times { display: inline;}
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(44, 85, 48, 0.2); z-index: 899; transition: opacity 0.2s;}
    .sidebar-overlay.active { display: block;}
    
    /* Gallery Styles */
    .gallery-root {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      background: var(--gallery-main);
      border-radius: 22px;
      padding: 36px 35px 30px 35px;
      box-shadow: var(--gallery-shadow);
      min-height: 80vh;
      border: 1px solid var(--border);
    }
    
    .gallery-title-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 29px;
    }
    
    .gallery-title-bar i {
      font-size: 2rem;
      color: var(--accent);
      background: rgba(230, 126, 34, 0.1);
      border-radius: 17px;
      padding: 7px 11px;
      box-shadow: 0 2px 8px rgba(230, 126, 34, 0.2);
    }
    
    .gallery-title-bar .gallery-title {
      font-size: 1.29rem;
      color: var(--gallery-title);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .theme-toggle {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      margin-left: auto;
      position: fixed;
      top: 128px;
      right: 19px;
      z-index: 9998;
    }

    .theme-toggle:hover {
      background: var(--accent);
      opacity: 0.9;
    }

    .language-toggle {
      background: linear-gradient(135deg, var(--sidebar1) 0%, var(--sidebar2) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: fixed;
      top: 130px;
      right: 19px;
      z-index: 9998;
      box-shadow: 0 2px 12px rgba(44, 85, 48, 0.25);
      min-width: 80px;
    }

    .language-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(44, 85, 48, 0.35);
    }

    .language-toggle:active {
      transform: translateY(0);
    }
    
    /* Gallery Publish List Styles */
    .gallery-publish-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .gallery-publish-card {
      background: var(--gallery-card);
      border-radius: 17px;
      box-shadow: var(--gallery-shadow);
      padding: 24px;
      border: 1px solid var(--border);
      position: relative;
      transition: all 0.3s;
    }

    .gallery-publish-card:hover {
      box-shadow: var(--gallery-shadow-hover);
      transform: translateY(-2px);
    }

    .gallery-meta {
      margin-bottom: 20px;
    }

    .gallery-meta-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--gallery-title);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .gallery-icon {
      color: var(--accent);
    }

    .gallery-meta-desc {
      font-size: 0.9rem;
      color: var(--subtle);
      line-height: 1.5;
    }

    .gallery-bulks {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .gallery-bulk-section {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      background: var(--comment-bg);
    }

    .gallery-bulk-date {
      font-size: 0.9rem;
      color: var(--gallery-date);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .gallery-bulk-thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
    }

    .gallery-thumb-wrap {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery-thumb-wrap:hover {
      transform: scale(1.05);
    }

    .gallery-thumb {
      width: 100%;
      height: 80px;
      object-fit: cover;
      display: block;
    }
    

    /* Comments Section */
    .comments-section {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .comments-title {
      font-size: 0.9rem;
      color: var(--label);
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .comment-input-container {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .comment-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--comment-bg);
      color: var(--label);
      font-size: 0.9rem;
      resize: none;
      min-height: 40px;
      max-height: 100px;
    }

    .comment-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .comment-submit {
      padding: 10px 16px;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .comment-submit:hover {
      background: #d35400;
      transform: translateY(-1px);
    }

    .comments-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .comment-item {
      background: var(--comment-bg);
      border: 1px solid var(--comment-border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .comment-author {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
    }

    .comment-date {
      font-size: 0.75rem;
      color: var(--subtle);
    }

    .comment-text {
      font-size: 0.9rem;
      color: var(--label);
      line-height: 1.4;
    }

    /* Modal Styles */
    .gallery-modal-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    
    .gallery-modal {
      background: var(--card);
      border-radius: 15px;
      padding: 20px;
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid var(--border);
    }
    
    .gallery-modal-close {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--subtle);
      cursor: pointer;
      z-index: 1;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .gallery-modal-close:hover {
      background: var(--border);
      color: var(--label);
    }
    
    .gallery-modal-img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    
    .gallery-modal-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--gallery-title);
      margin-bottom: 8px;
      text-align: center;
    }
    
    .gallery-modal-desc {
      font-size: 0.95rem;
      color: var(--subtle);
      margin-bottom: 8px;
      text-align: center;
    }
    
    .gallery-modal-date {
      font-size: 0.9rem;
      color: var(--gallery-date);
      margin-bottom: 15px;
    }
    
    .gallery-modal-nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .gallery-modal-btn {
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    
    .gallery-modal-btn:hover {
      background: #d35400;
    }
    
    .gallery-modal-download {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    
    .gallery-modal-download:hover {
      background: #2563eb;
    }

    /* Like button active state */
    .gallery-modal-like.active {
      background: var(--red) !important;
      color: white !important;
    }

    .gallery-modal-like.active i {
      animation: heartBeat 0.3s ease-in-out;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* Enhanced Modal Styles - Same as Teacher's Gallery */
    .enhanced-modal-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      backdrop-filter: blur(8px);
    }
    .enhanced-modal {
      background: var(--card);
      border-radius: 12px;
      max-width: 90vw;
      max-height: 90vh;
      width: 800px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border);
      position: relative;
      z-index: 1000000;
    }
    .enhanced-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--comment-bg);
    }
    .enhanced-modal-user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .enhanced-modal-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 600;
    }
    .enhanced-modal-username {
      font-weight: 600;
      color: var(--label);
      font-size: 14px;
    }
    .enhanced-modal-date {
      color: var(--subtle);
      font-size: 12px;
    }
    .enhanced-modal-close {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--subtle);
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      transition: background-color 0.3s;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .enhanced-modal-close:hover {
      background: var(--border);
      color: var(--label);
    }
    .enhanced-modal-content {
      flex: 1;
      overflow-y: auto;
      max-height: 70vh;
    }
    .enhanced-modal-media {
      position: relative;
      width: 100%;
      max-height: 400px;
      overflow: hidden;
    }
    .enhanced-modal-img,
    .enhanced-modal-video {
      width: 100%;
      height: auto;
      max-height: 70vh;
      object-fit: contain;
    }
    .enhanced-modal-actions {
      display: flex;
      gap: 15px;
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
    }
    .enhanced-action-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--subtle);
    }
    .enhanced-action-btn:hover {
      background: var(--border);
    }
    .enhanced-action-btn.like-btn.active {
      color: var(--red);
    }
    .enhanced-action-btn.like-btn.active i {
      animation: heartBeat 0.3s ease-in-out;
    }
    .like-count,
    .comment-count {
      font-size: 14px;
      font-weight: 500;
    }
    .enhanced-modal-description {
      padding: 15px 20px;
      color: var(--label);
      font-size: 14px;
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
    }
    .enhanced-modal-comments-section {
      padding: 15px 20px;
      display: none;
    }
    .enhanced-modal-comments-section.has-comments {
      display: block;
    }

    /* Comment Platform Overlay */
    .comment-platform-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200000;
      backdrop-filter: blur(8px);
    }
    .comment-platform {
      background: var(--card);
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      animation: slideInUp 0.3s ease-out;
      border: 1px solid var(--border);
      position: relative;
      z-index: 200001;
    }
    @keyframes slideInUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    .comment-platform-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--comment-bg);
    }
    .comment-platform-header h3 {
      margin: 0;
      color: var(--label);
      font-size: 18px;
      font-weight: 600;
    }
    .comment-platform-close {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--subtle);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background-color 0.3s;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .comment-platform-close:hover {
      background: var(--border);
      color: var(--label);
    }
    .comment-platform-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: calc(80vh - 80px);
    }
    .comment-platform .comments-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-height: 400px;
    }
    .comment-platform .comment-input-section {
      padding: 20px;
      border-top: 1px solid var(--border);
      background: var(--comment-bg);
    }
    .comment-platform .comment-input {
      border-radius: 25px;
      padding: 12px 20px;
      font-size: 14px;
      border: 1px solid var(--border);
      background: var(--gallery-card);
      color: var(--label);
    }
    .comment-platform .comment-submit-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: var(--accent);
      color: #ffffff;
      border: none;
      cursor: pointer;
    }
    .comments-header h4 {
      margin: 0 0 15px 0;
      color: var(--label);
      font-size: 16px;
    }
    .comments-list {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 15px;

  <script>
    // Sidebar logic
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    let menuOpen = false;
    function openSidebar() {
      menuOpen = true; sidebar.classList.add('menu-open');
      menuToggle.classList.add('menu-open'); sidebarOverlay.classList.add('active');
      document.body.classList.add('sidebar-open');
    }
    function closeSidebar() {
      menuOpen = false; sidebar.classList.remove('menu-open');
      menuToggle.classList.remove('menu-open'); sidebarOverlay.classList.remove('active');
      document.body.classList.remove('sidebar-open');
    }
    menuToggle.addEventListener('click', function(e) {
      e.stopPropagation(); (!menuOpen ? openSidebar() : closeSidebar());
    });
    sidebarOverlay.addEventListener('click', function() { closeSidebar(); });
    window.addEventListener('resize', function() {
      if (window.innerWidth > 1150 && menuOpen) closeSidebar();
    });
    sidebar.querySelectorAll('a').forEach(a => {
      a.onclick = () => { if(window.innerWidth <= 1150) closeSidebar(); }
    });

    // Theme toggle functionality
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    let isDarkMode = false;

    themeToggle.addEventListener('click', function() {
      isDarkMode = !isDarkMode;
      
      if (isDarkMode) {
        document.documentElement.style.setProperty('--bg', '#0f0f0f');
        document.documentElement.style.setProperty('--card', '#1a1a1a');
        document.documentElement.style.setProperty('--gallery-main', '#1a1a1a');
        document.documentElement.style.setProperty('--gallery-card', '#2d2d2d');
        document.documentElement.style.setProperty('--border', '#404040');
        document.documentElement.style.setProperty('--label', '#ffffff');
        document.documentElement.style.setProperty('--input', '#e5e5e5');
        document.documentElement.style.setProperty('--subtle', '#a0a0a0');
        document.documentElement.style.setProperty('--accent-light', '#1a1a1a');
        document.documentElement.style.setProperty('--comment-bg', '#2d2d2d');
        document.documentElement.style.setProperty('--comment-border', '#404040');
        themeIcon.className = 'fas fa-sun';
      } else {
        document.documentElement.style.setProperty('--bg', '#f8f9fa');
        document.documentElement.style.setProperty('--card', '#ffffff');
        document.documentElement.style.setProperty('--gallery-main', '#ffffff');
        document.documentElement.style.setProperty('--gallery-card', '#f8fafc');
        document.documentElement.style.setProperty('--border', '#e2e8f0');
        document.documentElement.style.setProperty('--label', '#1e293b');
        document.documentElement.style.setProperty('--input', '#334155');
        document.documentElement.style.setProperty('--subtle', '#64748b');
        document.documentElement.style.setProperty('--accent-light', '#f8f9fa');
        document.documentElement.style.setProperty('--comment-bg', '#f8fafc');
        document.documentElement.style.setProperty('--comment-border', '#e2e8f0');
        themeIcon.className = 'fas fa-moon';
      }
    });

    // API Configuration - Same as teacher's gallery
    const UPLOAD_ALBUM_API = 'https://1efeuebkh9.execute-api.ap-south-1.amazonaws.com/dev/upload-album';
    const UPLOAD_IMAGE_API = 'https://1efeuebkh9.execute-api.ap-south-1.amazonaws.com/dev/upload-image';
    const UPLOAD_VIDEO_API = 'https://1efeuebkh9.execute-api.ap-south-1.amazonaws.com/dev/upload-video';
    const DELETE_S3_API = 'https://1efeuebkh9.execute-api.ap-south-1.amazonaws.com/dev/api/delete-s3-object';
    
    // Gallery Interactions API (same as other modules)
    const GALLERY_INTERACTIONS_API = 'https://aszlb917ri.execute-api.ap-south-1.amazonaws.com/dev/gallery-interactions';
    
    // Performance Optimization: Cache system
    const interactionsCache = new Map();
    const CACHE_DURATION = 30000; // 30 seconds cache
    
    // Cache helper functions
    function getCacheKey(albumId, imageId) {
      return `${albumId}_${imageId}`;
    }
    
    function getCachedInteractions(albumId, imageId) {
      const key = getCacheKey(albumId, imageId);
      const cached = interactionsCache.get(key);
      
      if (cached && (Date.now() - cached.timestamp) < CACHE_DURATION) {
        console.log('Using cached interactions for:', key);
        return cached.data;
      }
      
      return null;
    }
    
    function setCachedInteractions(albumId, imageId, data) {
      const key = getCacheKey(albumId, imageId);
      interactionsCache.set(key, {
        data: data,
        timestamp: Date.now()
      });
      console.log('Cached interactions for:', key);
    }
    
    function invalidateCache(albumId, imageId) {
      const key = getCacheKey(albumId, imageId);
      interactionsCache.delete(key);
      console.log('Invalidated cache for:', key);
    }
    
    // Global data storage
    let albums = [];
    let currentAlbumIndex = null;
    let currentImageIndex = null;
    let currentCommentAlbum = null;
    let currentCommentMedia = null;
    let currentCommentType = null;
    
    // Performance optimization: Caching
    let albumsCache = null;
    let lastCacheTime = 0;
    const ALBUMS_CACHE_DURATION = 5 * 60 * 1000; // 5 minutes

    // API Functions for Gallery Interactions (Parent Module)
    
    // Get parent data from session (same pattern as other modules)
    function getCurrentParent() {
      const userData = window.UserSession ? window.UserSession.getUserData() : null;
      if (!userData || !userData.isAuthenticated) {
        console.error('Parent not authenticated');
        return null;
      }
      return {
        user_id: userData.user.parent_id,        // Parent ID
        user_name: userData.user.parent_name || userData.user.full_name,    // Parent name (primary: parent_name, fallback: full_name)
        user_type: userData.userType            // "parent" or "parents"
      };
    }

    // Toggle like/unlike (Parent)
    async function toggleLike(albumId, imageId) {
      const parent = getCurrentParent();
      if (!parent) {
        showPopup('Error', 'Authentication Required', 'Please log in to like images.', 'OK');
        return null;
      }

      try {
        const response = await fetch(`${GALLERY_INTERACTIONS_API}/like`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            user_id: parent.user_id,             // parent_id
            user_name: parent.user_name,         // parent_name
            user_type: parent.user_type,         // "parent" or "parents"
            image_id: imageId,

    // Handle delete comment with optimistic UI updates
    async function handleDeleteComment(interactionId, timestamp, albumId, imageId) {
      const confirmed = await showPopup('Delete Comment', 'Are you sure you want to delete this comment? This action cannot be undone.', 'warning', true);
      if (!confirmed) return;

      try {
        // Delete comment via API
        const result = await deleteComment(interactionId, timestamp, albumId, imageId);
        
        if (result) {
          // Optimistic UI update - remove the deleted comment immediately
          const commentsList = document.getElementById('modalCommentsList');
          const commentElements = commentsList.querySelectorAll('.comment-item');
          
          // Store current UI state before making changes
          const currentUIState = {
            commentElements: Array.from(commentElements).length,
            commentCount: parseInt(document.getElementById('modalCommentCount').textContent) || 0
          };
          
          // Find and remove the deleted comment from DOM
          let commentRemoved = false;
          commentElements.forEach(element => {
            const deleteBtn = element.querySelector('.delete-comment-btn');
            if (deleteBtn && deleteBtn.onclick && 
                deleteBtn.onclick.toString().includes(interactionId)) {
              element.remove();
              commentRemoved = true;
              console.log('Removed deleted comment from DOM');
            }
          });
          
          // Update comment count optimistically
          const commentCount = document.getElementById('modalCommentCount');
          const newCount = Math.max(0, currentUIState.commentCount - 1);
          commentCount.textContent = newCount;
          
          // Only do background refresh if we actually removed a comment
          if (commentRemoved) {
            // Invalidate cache and refresh in background (non-blocking)
            invalidateCache(albumId, imageId);
            setTimeout(async () => {
              try {
                const interactions = await getInteractions(albumId, imageId, true);
                console.log('Background refresh - interactions:', interactions);
                
                // Only update if we got MORE comments than expected (someone else added a comment)
                // Don't update if API returns fewer or same comments (it might be a cache/DB issue)
                if (interactions.comments.length > newCount) {
                  console.log('Background refresh found new comments, updating UI');
                  renderModalComments(interactions.comments);
                  commentCount.textContent = interactions.comments_count;
                } else if (interactions.comments.length === newCount && interactions.comments.length > 0) {
                  console.log('Background refresh confirmed correct count, updating with fresh data');
                  renderModalComments(interactions.comments);
                  commentCount.textContent = interactions.comments_count;
                } else {
                  console.log('Background refresh returned incorrect data, keeping optimistic update');
                  // Don't update the UI - keep the optimistic state
                }
              } catch (error) {
                console.log('Background refresh failed, keeping optimistic update:', error);
              }
            }, 1000); // Increased delay to give DB more time
          }
          
          console.log('Comment deleted successfully:', result);
        }
      } catch (error) {
        console.error('Error handling comment deletion:', error);
        showPopup('Error', 'Failed to delete comment', 'Please try again.', 'OK');
      }
    }

      const possibleImageFields = ['img_url', 'image_url', 'images', 'imageUrls', 'image_urls'];
      let imageData = null;
      
      for (const field of possibleImageFields) {
        if (album[field]) {
          console.log(`Found image data in field: ${field}`, album[field]);
          imageData = album[field];
          break;
        }
      }
      
      if (imageData) {
        if (typeof imageData === 'string') {
          try {
            const parsed = JSON.parse(imageData);
            images = Array.isArray(parsed) ? parsed : [];
          } catch (e) {
            console.warn('Failed to parse image data JSON:', e);
            images = Array.isArray(imageData) ? imageData : [];
          }
        } else if (Array.isArray(imageData)) {
          images = imageData;
        } else {
          console.warn('Image data is neither string nor array:', imageData);
        }
      }
      
      console.log('Returning images with original structure:', images);
      return images;

    function getImageUrlsFromAlbum(album) {
      const images = getImagesFromAlbum(album);
      const urls = [];
      
      images.forEach(img => {
        if (typeof img === 'string' && img.trim() !== '') {
          urls.push(img);
        } else if (typeof img === 'object' && img !== null) {
          if (img.url && typeof img.url === 'string') {
            urls.push(img.url);
          } else if (img.key && typeof img.key === 'string') {
            urls.push(`https://admin-image-upload-bc360.s3.amazonaws.com/${img.key}`);

        likeBtn.classList.remove('active');
        likeCount.textContent = '0';
        commentCount.textContent = '0';
      }
    }

    function updateNavigationButtons(albumIndex, mediaIndex) {
      const album = albums[albumIndex];
      const images = getImageUrlsFromAlbum(album);
      const videos = getVideoUrlsFromAlbum(album);
      const allMedia = [...images, ...videos];
      
      const prevBtn = document.getElementById('enhancedModalPrev');
      const nextBtn = document.getElementById('enhancedModalNext');
      
      // Disable/enable prev button
      if (allMedia.length <= 1 || mediaIndex === 0) {
        prevBtn.disabled = true;
        prevBtn.style.opacity = '0.5';
        prevBtn.style.cursor = 'not-allowed';
      } else {
        prevBtn.disabled = false;
        prevBtn.style.opacity = '1';
        prevBtn.style.cursor = 'pointer';
      }
      
      // Disable/enable next button
      if (allMedia.length <= 1 || mediaIndex === allMedia.length - 1) {
        nextBtn.disabled = true;
        nextBtn.style.opacity = '0.5';
        nextBtn.style.cursor = 'not-allowed';
      } else {
        nextBtn.disabled = false;
        nextBtn.style.opacity = '1';
        nextBtn.style.cursor = 'pointer';
      }
    }

    function renderModalComments(comments) {
      const commentsList = document.getElementById('modalCommentsList');
      commentsList.innerHTML = '';
      
      if (comments.length === 0) {
        commentsList.innerHTML = '<div class="no-comments">No comments yet</div>';
        return;
      }
      
      // Sort comments by timestamp (newest first)
      const sortedComments = comments.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      
      sortedComments.forEach(comment => {
        const commentItem = document.createElement('div');
        commentItem.className = 'comment-item';
        
        // Get first letter of user name for avatar
        const avatarLetter = comment.user_name ? comment.user_name.charAt(0).toUpperCase() : 'U';
        
        // Format user type for display
        const userTypeDisplay = formatUserType(comment.user_type);
        
        // Format timestamp
        const date = new Date(comment.timestamp);
        const timeAgo = getTimeAgo(date);
        
        // Check if current user can delete this comment
        const currentParent = getCurrentParent();
        const isCurrentUserComment = currentParent && comment.user_id === currentParent.user_id;
        
        const deleteButtonHtml = isCurrentUserComment ? 
          `<button class="delete-comment-btn" onclick="handleDeleteComment('${comment.interaction_id}', '${comment.timestamp}', ${currentAlbumIndex}, ${currentImageIndex})" title="Delete comment">
            <i class="fas fa-trash"></i>
          </button>` : '';
        
        commentItem.innerHTML = `
          <div class="comment-avatar ${comment.user_type.toLowerCase()}">${avatarLetter}</div>
          <div class="comment-content">
            <div class="comment-author">
              ${comment.user_name}
              <span class="user-type-badge ${comment.user_type.toLowerCase()}">${userTypeDisplay}</span>
            </div>
            <div class="comment-text">${comment.comment_text}</div>
            <div class="comment-date">${timeAgo}</div>
          </div>
          ${deleteButtonHtml}
        `;
        commentsList.appendChild(commentItem);
      });
    }

    // Helper function to format user type for display
    function formatUserType(userType) {
      switch(userType.toLowerCase()) {
        case 'student':
          return 'Student';
        case 'teacher':
          return 'Teacher';
        case 'admin':
          return 'Admin';
        case 'parent':
        case 'parents':
          return 'Parent';
        default:
          return userType;
      }
    }

    // Helper function to format time ago
    function getTimeAgo(date) {
      const now = new Date();
      const diffInSeconds = Math.floor((now - date) / 1000);
      
      if (diffInSeconds < 60) {
        return 'just now';
      } else if (diffInSeconds < 3600) {
        const minutes = Math.floor(diffInSeconds / 60);
        return `${minutes}m ago`;
      } else if (diffInSeconds < 86400) {
        const hours = Math.floor(diffInSeconds / 3600);
        return `${hours}h ago`;
      } else if (diffInSeconds < 604800) {
        const days = Math.floor(diffInSeconds / 86400);
        return `${days}d ago`;
      } else if (diffInSeconds < 2592000) {
        const weeks = Math.floor(diffInSeconds / 604800);
        return `${weeks}w ago`;
      } else if (diffInSeconds < 31536000) {
        const months = Math.floor(diffInSeconds / 2592000);
        return `${months}mo ago`;
      } else {
        const years = Math.floor(diffInSeconds / 31536000);
        return `${years}y ago`;
      }
    }

    function addEnhancedModalEventListeners() {
      const modal = document.getElementById('enhancedModal');
      const closeBtn = document.getElementById('enhancedModalClose');
      const likeBtn = document.getElementById('modalLikeBtn');
      const commentBtn = document.getElementById('modalCommentBtn');
      const shareBtn = document.getElementById('modalShareBtn');
      const downloadBtn = document.getElementById('modalDownloadBtn');
      const prevBtn = document.getElementById('enhancedModalPrev');
      const nextBtn = document.getElementById('enhancedModalNext');
      
      closeBtn.onclick = closeEnhancedModal;
      
      likeBtn.onclick = () => handleModalLike();
      commentBtn.onclick = () => openCommentPlatform();
      shareBtn.onclick = () => handleModalShare();
      downloadBtn.onclick = () => handleModalDownload();
      
      prevBtn.onclick = () => navigateModalPrev();
      nextBtn.onclick = () => navigateModalNext();
      
      // Close modal when clicking outside
      modal.onclick = (e) => {
        if (e.target === modal) {
          closeEnhancedModal();
        }
      };
      
      // Keyboard navigation
      document.addEventListener('keydown', handleModalKeyboard);
    }

    async function handleModalLike() {
      try {
        const album = albums[currentAlbumIndex];
        if (!album) {
          console.error('Album not found for currentAlbumIndex:', currentAlbumIndex);
          return;
        }

        const albumId = album.id || `album_${currentAlbumIndex}`;
        const imageId = `image_${currentImageIndex}`;

        const likeBtn = document.getElementById('modalLikeBtn');
        const likeCount = document.getElementById('modalLikeCount');
        
        // Optimistic UI update (immediate response)
        const currentLiked = likeBtn.dataset.liked === 'true';
        const newLikedState = !currentLiked;
        const currentCount = parseInt(likeCount.textContent) || 0;
        
        // Update UI immediately
        likeBtn.dataset.liked = newLikedState;
        likeBtn.classList.toggle('active', newLikedState);
        likeCount.textContent = newLikedState ? currentCount + 1 : Math.max(0, currentCount - 1);
        
        // Invalidate cache for this image
        invalidateCache(albumId, imageId);

        // Toggle like via API (background)
        const result = await toggleLike(albumId, imageId);
        
        if (result) {
          // Update with actual API response
          const interactions = await getInteractions(albumId, imageId, true); // Force refresh
          likeCount.textContent = interactions.likes_count;
          
          console.log('Parent like toggled successfully:', result);
        } else {
          // Revert optimistic update on error
          likeBtn.dataset.liked = currentLiked;
          likeBtn.classList.toggle('active', currentLiked);
          likeCount.textContent = currentCount;
        }
      } catch (error) {
        console.error('Error handling modal like:', error);
        showPopup('Error', 'Failed to update like', 'Please try again.', 'OK');
      }
    }

    async function openCommentPlatform() {
      const overlay = document.getElementById('commentPlatformOverlay');
      overlay.style.display = 'flex';
      
      // Show loading state immediately
      const commentsList = document.getElementById('modalCommentsList');
      commentsList.innerHTML = '<div class="loading-comments">Loading comments...</div>';
      
      try {
        const album = albums[currentAlbumIndex];
        if (!album) {
          console.error('Album not found for currentAlbumIndex:', currentAlbumIndex);
          return;
        }

        const albumId = album.id || `album_${currentAlbumIndex}`;
        const imageId = `image_${currentImageIndex}`;

        // Load comments from API (with caching - should be fast)
        const interactions = await getInteractions(albumId, imageId);
        renderModalComments(interactions.comments);
        
        // Setup comment submission
        const submitBtn = document.getElementById('modalSubmitComment');
        const input = document.getElementById('modalCommentInput');
        
        submitBtn.onclick = () => handleModalCommentSubmit();
        input.onkeypress = (e) => {
          if (e.key === 'Enter') {
            handleModalCommentSubmit();
          }
        };
        
        console.log('Comment platform opened with', interactions.comments.length, 'comments (parent view)');
      } catch (error) {
        console.error('Error opening comment platform:', error);
        renderModalComments([]);
      }
    }

    function closeCommentPlatform() {
      const overlay = document.getElementById('commentPlatformOverlay');
      overlay.style.display = 'none';
    }

    function handleModalShare() {
      const album = albums[currentAlbumIndex];
      const images = getImageUrlsFromAlbum(album);
      const videos = getVideoUrlsFromAlbum(album);
      const mediaUrl = currentCommentType === 'video' ? videos[currentImageIndex] : images[currentImageIndex];
      
      if (navigator.share) {
        navigator.share({
          title: album.description || 'BC360 Gallery',
          text: album.description || 'Check out this image from BC360!',
          url: mediaUrl
        });
      } else {
        // Fallback: copy to clipboard
        navigator.clipboard.writeText(mediaUrl).then(() => {
          showPopup('Success', 'Link copied to clipboard!', 'success');
        });
      }
    }

    async function handleModalDownload() {
      try {
        const album = albums[currentAlbumIndex];
        const images = getImageUrlsFromAlbum(album);
        const videos = getVideoUrlsFromAlbum(album);
        const mediaUrl = currentCommentType === 'video' ? videos[currentImageIndex] : images[currentImageIndex];
        
        const fileName = `bc360_${album.description || 'gallery'}_${Date.now()}.${currentCommentType === 'video' ? 'mp4' : 'jpg'}`;

        // Extract S3 key from URL
        const s3Key = mediaUrl.split('s3.amazonaws.com/')[1];

        // Get presigned download URL
        const response = await fetch(`${UPLOAD_ALBUM_API}/download?key=${encodeURIComponent(s3Key)}&filename=${encodeURIComponent(fileName)}`);
        if (!response.ok) {
          throw new Error(`Failed to get download URL: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        
        // Create download link with presigned URL
        const link = document.createElement('a');
        link.href = data.downloadUrl;
        link.download = data.filename;
        link.style.display = 'none';
        link.target = '_blank';
        
        // Add link to DOM, click it, and clean up
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        // No popup - download starts silently
      } catch (error) {
        console.error('Download error:', error);
        showPopup('Error', 'Download Failed', 'Failed to download file', error.message);
      }
    }

    async function handleModalCommentSubmit() {
      const input = document.getElementById('modalCommentInput');
      const commentText = input.value.trim();
      
      if (!commentText) return;
      
      try {
        const album = albums[currentAlbumIndex];
        if (!album) {
          console.error('Album not found for currentAlbumIndex:', currentAlbumIndex);
          return;
        }

        const albumId = album.id || `album_${currentAlbumIndex}`;
        const imageId = `image_${currentImageIndex}`;

        // Clear input immediately (optimistic UI)
        input.value = '';
        
        // Show loading state
        const submitBtn = document.getElementById('modalSubmitComment');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Posting...';
        submitBtn.disabled = true;

        // Add comment via API
        const result = await addComment(albumId, imageId, commentText);
        
        if (result) {
          // Invalidate cache to force refresh
          invalidateCache(albumId, imageId);
          
          // Reload comments from API to get updated list
          const interactions = await getInteractions(albumId, imageId, true); // Force refresh
          renderModalComments(interactions.comments);
          
          // Update comment count in modal
          const commentCount = document.getElementById('modalCommentCount');
          commentCount.textContent = interactions.comments_count;
          
          console.log('Parent comment added successfully:', result);
        } else {
          // Restore comment text on error
          input.value = commentText;
        }
        
        // Restore button state
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
        
      } catch (error) {
        console.error('Error submitting comment:', error);
        showPopup('Error', 'Failed to add comment', 'Please try again.', 'OK');
        
        // Restore button state
        const submitBtn = document.getElementById('modalSubmitComment');
        submitBtn.textContent = 'Post';
        submitBtn.disabled = false;
      }
    }

    function navigateModalPrev() {
      const album = albums[currentAlbumIndex];
      const images = getImageUrlsFromAlbum(album);
      const videos = getVideoUrlsFromAlbum(album);
      const allMedia = [...images, ...videos];
      
      if (allMedia.length <= 1 || currentImageIndex === 0) return;
      
      currentImageIndex = currentImageIndex - 1;
      
      // Determine if current media is video or image
      const currentMedia = allMedia[currentImageIndex];
      const isVideo = currentMedia.includes('video') || currentMedia.includes('.mp4') || currentMedia.includes('.mov');
      currentCommentType = isVideo ? 'video' : 'image';
      
      // Update modal content
      const modalImg = document.getElementById('enhancedModalImg');
      const modalVideo = document.getElementById('enhancedModalVideo');
      
      if (isVideo) {
        modalImg.style.display = 'none';
        modalVideo.style.display = 'block';
        modalVideo.src = currentMedia;
      } else {
        modalVideo.style.display = 'none';
        modalImg.style.display = 'block';
        modalImg.src = currentMedia;
      }
      
      loadModalLikesAndComments(currentAlbumIndex, currentImageIndex, currentCommentType);
    }

    function navigateModalNext() {
      const album = albums[currentAlbumIndex];
      const images = getImageUrlsFromAlbum(album);
      const videos = getVideoUrlsFromAlbum(album);
      const allMedia = [...images, ...videos];
      
      if (allMedia.length <= 1 || currentImageIndex === allMedia.length - 1) return;
      
      currentImageIndex = currentImageIndex + 1;
      
      // Determine if current media is video or image
      const currentMedia = allMedia[currentImageIndex];
      const isVideo = currentMedia.includes('video') || currentMedia.includes('.mp4') || currentMedia.includes('.mov');
      currentCommentType = isVideo ? 'video' : 'image';
      
      // Update modal content
      const modalImg = document.getElementById('enhancedModalImg');
      const modalVideo = document.getElementById('enhancedModalVideo');
      
      if (isVideo) {
        modalImg.style.display = 'none';
        modalVideo.style.display = 'block';
        modalVideo.src = currentMedia;
      } else {
        modalVideo.style.display = 'none';
        modalImg.style.display = 'block';
        modalImg.src = currentMedia;
      }
      
      loadModalLikesAndComments(currentAlbumIndex, currentImageIndex, currentCommentType);
    }

    function handleModalKeyboard(e) {
      if (document.getElementById('enhancedModal').style.display === 'flex') {
        switch (e.key) {
          case 'ArrowLeft':
            navigateModalPrev();
            break;
          case 'ArrowRight':
            navigateModalNext();
            break;
          case 'Escape':
            closeEnhancedModal();
            break;
        }
      }
    }

    // Modal event listeners
    document.addEventListener('DOMContentLoaded', function() {
      // Load albums
      loadAlbums(true);
      
      // Add enhanced modal event listeners
      addEnhancedModalEventListeners();
      
      // Comment platform close functionality
      document.getElementById('commentPlatformClose').onclick = function() {
        closeCommentPlatform();
      };

      // Close comment platform when clicking outside
      document.getElementById('commentPlatformOverlay').onclick = function(e) {
        if (e.target === this) {
          closeCommentPlatform();
        }
      };
    });

    // Expose functions for HTML onclick
    window.openEnhancedModal = openEnhancedModal;
    window.handleModalLike = handleModalLike;
    window.handleModalShare = handleModalShare;
    window.handleModalDownload = handleModalDownload;
  </script>

  <script>
    // Authentication check and user tracking for Parents Module
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for auth system to load
      setTimeout(() => {
        if (window.UserSession) {
          const userData = window.UserSession.getUserData();
          if (userData && userData.isAuthenticated) {
            // 🛡️ SECURITY CHECK: Verify user is actually a parent
            if (userData.userType !== 'parents' && userData.userType !== 'parent') {
              console.log('❌ UNAUTHORIZED ACCESS DENIED:', userData.userType, 'trying to access parents module');
              console.log('🚨 Security Alert: User', userData.displayName, 'with role', userData.userType, 'attempted to access parent-only content');
              
              // Show security alert and redirect
              alert(`🚫 Access Denied!\n\nThis module is restricted to parents only.\nYour current role: ${userData.userType}\n\nYou will be redirected to the login page.`);
              
              // Clear potentially compromised session
              window.UserSession.clearUserData();
              window.location.href = '../login.html';
              return;
            }
            
            console.log('✅ Parent authentication successful for gallery:', userData);
            
            // Update UI with parent information
            updateParentUI(userData);
            
            // Track parent activity
            trackParentActivity(userData);
            
          } else {
            console.log('❌ No valid session found, redirecting to login');
            window.location.href = '../login.html';
          }
        } else {
          console.error('❌ UserSession not available, redirecting to login');
          window.location.href = '../login.html';
        }
      }, 100);
    });

    // Update UI with parent information
    function updateParentUI(userData) {
      // Update any user display elements
      const userNameElements = document.querySelectorAll('.user-name, .parent-name, .welcome-text');
      userNameElements.forEach(element => {
        if (userData.name || userData.displayName) {
          element.textContent = `Welcome, ${userData.name || userData.displayName}`;
        }
      });

      // Update parent ID if displayed
      const parentIdElements = document.querySelectorAll('.parent-id');
      parentIdElements.forEach(element => {
        if (userData.parent_userId || userData.id) {
          element.textContent = `Parent ID: ${userData.parent_userId || userData.id}`;
        }
      });

      console.log('✅ Parent UI updated with user data');
    }

    // Track parent activity for security monitoring
    function trackParentActivity(userData) {
      const activityData = {
        timestamp: new Date().toISOString(),
        userType: userData.userType,
        userId: userData.parent_userId || userData.id,
        page: 'gallery',
        action: 'page_access'
      };
      
      console.log('📊 Parent activity tracked:', activityData);
      
      // Store activity in session storage for security monitoring
      const activities = JSON.parse(sessionStorage.getItem('parent_activities') || '[]');
      activities.push(activityData);
      
      // Keep only last 10 activities
      if (activities.length > 10) {
        activities.splice(0, activities.length - 10);
      }
      
      sessionStorage.setItem('parent_activities', JSON.stringify(activities));
    }

    // Enhanced security: Monitor for suspicious activity
    function monitorParentSecurity() {
      const activities = JSON.parse(sessionStorage.getItem('parent_activities') || '[]');
      const recentActivities = activities.filter(activity => {
        const activityTime = new Date(activity.timestamp);
        const fiveMinutesAgo = new Date(Date.now() - 5 * 60 * 1000);
        return activityTime > fiveMinutesAgo;
      });

      if (recentActivities.length > 20) {
        console.warn('🚨 SECURITY WARNING: Unusual parent activity detected');
        // Could implement additional security measures here
      }
    }

    // Run security monitoring every minute
    setInterval(monitorParentSecurity, 60000);

    // Language Toggle Functionality
    let currentLanguage = localStorage.getItem('selectedLanguage') || 'en'; // Load saved language or default to English

    function switchLanguage() {
      currentLanguage = currentLanguage === 'en' ? 'kn' : 'en';
      localStorage.setItem('selectedLanguage', currentLanguage);
      applyLanguage();
    }

    function applyLanguage() {
      const languageToggle = document.getElementById('languageToggle');
      languageToggle.textContent = currentLanguage === 'en' ? 'ಕನ್ನಡ' : 'English';
      
      const translatableElements = document.querySelectorAll('.translate');
      translatableElements.forEach(element => {
        const enText = element.getAttribute('data-en');
        const knText = element.getAttribute('data-kn');
        if (enText && knText) {
          element.textContent = currentLanguage === 'en' ? enText : knText;
        }
      });
    }

    // Add event listener for language toggle
    document.getElementById('languageToggle').addEventListener('click', switchLanguage);
    
    // Apply saved language on page load
    window.addEventListener('load', function() {
      applyLanguage();
    });

    // Professional logout function for parents
    function logout() {
      if (window.professionalLogout) {
        window.professionalLogout.triggerLogout();
      } else {
        // Fallback implementation
        if (confirm('Are you sure you want to log out?')) {
          localStorage.clear();
          sessionStorage.clear();
          window.location.href = '../login.html';
        }
      }
    }
  </script>
