<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width"/>
  <title>BC360 - Change Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sidebar1: #2c5530;
      --sidebar2: #4a7c59;
      --sidebar-shadow: 0 4px 26px #1d26401c;
      --sidebar-width: 245px;
      --accent: #e67e22;
      --accent-light: #f8f9fa;
      --bg: #f8f9fa;
      --card: #ffffff;
      --border: #e2e8f0;
      --label: #1e293b;
      --input: #334155;
      --subtle: #64748b;
      --error: #ef4444;
      --required: #f59e0b;
      --radius: 13px;
      --shadow: 0 1.5px 10px #1d264015;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --blue: #3b82f6;
      --red: #ef4444;
      --green: #10b981;
      --purple: #8b5cf6;
      --yellow: #fbbf24;
      --drawer-bg: rgba(0, 0, 0, 0.8);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 50%, #f1f5f9 100%);
      min-height: 100vh;
      width: 100vw;
      color: var(--input);
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(230, 126, 34, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(44, 85, 48, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(52, 152, 219, 0.05) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .app-flex { display: flex; flex-direction: row; min-height: 100vh; width: 100vw; }
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: linear-gradient(180deg, var(--sidebar1) 0%, var(--sidebar2) 100%);
      color: #fff; display: flex; flex-direction: column;
      justify-content: space-between; box-shadow: var(--sidebar-shadow); z-index: 1000; height: 100vh; position: fixed; left: 0; top: 0;
      transition: left 0.28s; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #cce6ff #fff;
    }

    .sidebar.menu-open {
      left: 0 !important;
      z-index: 1001;
    }

    .sidebar::-webkit-scrollbar { width: 6px; background: #f1f5fc;}
    .sidebar::-webkit-scrollbar-thumb { background: #cce6ff; border-radius: 4px;}
    .sidebar .brand { display: flex; align-items: center; justify-content: center; padding: 10px 6px; transition: transform 0.2s; }
    .sidebar .brand img { width: 100%; height: 50px; border-radius: 3px; object-fit: contain; transition: transform 0.2s; }
    .sidebar .brand:hover img { transform: scale(1.05); }
    .sidebar hr { border: 0; border-top: 1.3px solid rgba(255,255,255,0.2); margin: 0 12px 16px 12px; }
    .sidebar ul { list-style: none; padding: 0; margin: 0; }
    .sidebar ul li { margin: 0; }
    .sidebar ul li a { color: #fff; font-size: 1.06rem; text-decoration: none; display: flex; align-items: center; padding: 12px 10px 12px 24px; border-radius: 7px 0 0 7px; transition: all 0.22s; font-weight: 500; gap: 13px; position: relative; overflow: hidden; }
    .sidebar ul li a::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%); transition: width 0.3s; }
    .sidebar ul li a:hover::before { width: 100%; }
    .sidebar ul li a.active, .sidebar ul li a:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
    .sidebar .logout { border-top: 1px solid rgba(255,255,255,0.2); margin-top: 15px; padding: 24px 0 28px 10px;}
    .sidebar .logout a { color: #fff; font-size: 1.05rem; text-decoration: none; display: flex; align-items: center; gap: 11px; padding: 10px 12px 10px 24px; border-radius: 6px; transition: all 0.22s; position: relative; overflow: hidden; }
    .sidebar .logout a::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%); transition: width 0.3s; }
    .sidebar .logout a:hover::before { width: 100%; }
    .sidebar .logout a:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
    .sidebar-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      filter: none !important;
      -webkit-filter: none !important;
    }
    .main-content { margin-left: var(--sidebar-width); flex: 1; width: calc(100vw - var(--sidebar-width)); min-height: 100vh; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 0; transition: margin-left 0.28s; z-index: 1; }
    .top-bar { width: 100%; display: flex; align-items: center; justify-content: center; gap: 15px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 20px 30px; font-size: 1.8rem; font-weight: 700; letter-spacing: 0.01em; color: var(--label); position: relative; z-index: 2; box-shadow: 0 2px 20px rgba(44, 85, 48, 0.1); }
    .top-bar .fa-key { font-size: 2.1rem; color: var(--accent);}
    .sidebar-hamburger { display: none; position: fixed; top: 18px; right: 19px; z-index: 9999; font-size: 2.1rem; background: #fff; color: var(--sidebar1); border: none; border-radius: 7px; padding: 6px 14px 7px 14px; box-shadow: 0 2px 12px rgba(44, 85, 48, 0.15); cursor: pointer; transition: background 0.18s, color 0.18s;}
    .sidebar-hamburger.menu-open { background: var(--accent-light); color: var(--accent);}
    .sidebar-hamburger .fa-times { display: none;}
    .sidebar-hamburger.menu-open .fa-bars { display: none;}
    .sidebar-hamburger.menu-open .fa-times { display: inline;}
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(44, 85, 48, 0.2); z-index: 899; transition: opacity 0.2s;}
    .sidebar-overlay.active { display: block;}

    .theme-toggle {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      position: fixed;
      top: 90px;
      right: 19px;
      z-index: 9998;
    }

    .theme-toggle:hover {
      background: var(--accent);
      opacity: 0.9;
    }

    .language-toggle {
      background: linear-gradient(135deg, var(--sidebar1) 0%, var(--sidebar2) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: fixed;
      top: 130px;
      right: 19px;
      z-index: 9998;
      box-shadow: 0 2px 12px rgba(44, 85, 48, 0.25);
      min-width: 80px;
    }

    .language-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(44, 85, 48, 0.35);
    }

    .language-toggle:active {
      transform: translateY(0);
    }

    /* Change Password Form Styles */
    .change-password-container {
      width: 490px;
      max-width: 97vw;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 50px 40px 35px 40px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      border: 1px solid var(--border);
      margin: 0 auto;
      position: relative;
      z-index: 1;
      transition: box-shadow 0.18s;
    }
    .change-password-container:hover {
      box-shadow: 0 4px 20px rgba(44, 85, 48, 0.15);
    }
    
    @media (max-width: 650px) {
      .change-password-container {
        width: 98vw; 
        padding: 25px 3vw 18px 3vw;
      }
    }
    
    .change-password-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 0px;
      margin-top: 0;
      justify-content: left;
    }
    .change-password-header i {
      font-size: 2.2rem;
      color: var(--accent);
    }
    .change-password-header h2 {
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0;
      line-height: 1.13;
    }
    .change-password-label {
      margin: 35px 0 18px 0;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--label);
    }
    
    /* Password Form Fields */
    .cp-form-group {
      display: flex;
      align-items: center;
      position: relative;
      margin-bottom: 20px;
    }
    .cp-input {
      width: 100%;
      padding: 16px 50px 16px 20px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 1.1rem;
      color: var(--input);
      background: var(--card);
      transition: all 0.3s ease;
      outline: none;
    }
    .cp-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(230, 126, 34, 0.1);
    }
    .cp-input::placeholder {
      color: var(--subtle);
    }
    .cp-eye {
      position: absolute;
      right: 18px;
      color: var(--subtle);
      cursor: pointer;
      font-size: 1.2rem;
      transition: color 0.2s;
    }
    .cp-eye:hover {
      color: var(--accent);
    }
    
    /* Button Styles */
    .cp-btn-row {
      display: flex;
      gap: 16px;
      margin-top: 30px;
    }
    .cp-btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .cp-btn-reset {
      background: var(--subtle);
      color: white;
    }
    .cp-btn-reset:hover {
      background: var(--input);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(100, 116, 139, 0.3);
    }
    .cp-btn-save {
      background: linear-gradient(135deg, var(--accent) 0%, var(--yellow) 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
    }
    .cp-btn-save:hover {
      background: linear-gradient(135deg, var(--yellow) 0%, var(--accent) 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(230, 126, 34, 0.4);
    }
    
    @media (max-width: 400px) {
      .change-password-header h2 {
        font-size: 1.2rem;
      }
      .change-password-container {
        padding: 15px 2vw;
      }
      .cp-btn {
        font-size: 0.98rem; 
        padding: 10px 12px;
      }
    }

    /* Custom Popup Styles */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--drawer-bg);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      backdrop-filter: blur(8px);
    }
    .popup-overlay.show {
      display: flex;
    }
    .popup {
      background: var(--card);
      border-radius: 20px;
      padding: 30px 25px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      animation: popupSlideIn 0.4s ease;
    }
    @keyframes popupSlideIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    .popup-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .popup-icon.success {
      color: var(--success);
    }
    .popup-icon.error {
      color: var(--error);
    }
    .popup-icon.warning {
      color: var(--warning);
    }
    .popup-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--label);
      margin-bottom: 12px;
    }
    .popup-message {
      font-size: 1rem;
      color: var(--input);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .popup-btn {
      background: linear-gradient(135deg, var(--accent) 0%, var(--yellow) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
    }
    .popup-btn:hover {
      background: linear-gradient(135deg, var(--yellow) 0%, var(--accent) 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(230, 126, 34, 0.4);
    }

    /* Responsive Design */
    @media (max-width: 1150px) {
      .sidebar { left: -260px; position: fixed; width: var(--sidebar-width); max-width: var(--sidebar-width); z-index: 910; transition: left 0.25s;}
      .sidebar.menu-open { left: 0;}
      .main-content { margin-left: 0; width: 100vw;}
      .sidebar-hamburger { display: block;}
      .sidebar-overlay { display: none;}
      .sidebar-overlay.active { display: block;}
    }
    
    @media (max-width: 768px) {
      .sidebar-hamburger {
        display: block;
        top: 18px;
        right: 19px;
        left: auto;
      }
      .theme-toggle {
        top: 90px;
        right: 19px;
      }
      .change-password-container { 
        padding: 20px; 
        margin: 20px;
      }
      .cp-btn-row { 
        flex-direction: column; 
        gap: 12px;
      }
      .cp-btn { 
        width: 100%; 
        justify-content: center; 
      }
      .popup {
        margin: 20px;
      }
    }
    
    @media (max-width: 600px) {
      .sidebar-hamburger {
        right: 8px;
        top: 10px;
        font-size: 2.0rem;
        padding: 4px 10px 5px 10px;
      }
      .theme-toggle {
        top: 90px;
        right: 8px;
      }
    }
    
    @media (max-width: 480px) {
      .change-password-container { 
        padding: 16px; 
        margin: 10px;
      }
      .change-password-header h2 { 
        font-size: 1.8rem; 
      }
      .change-password-label { 
        font-size: 1.1rem; 
      }
      .cp-input { 
        font-size: 1rem; 
        padding: 12px 10px; 
      }
      .theme-toggle {
        top: 90px;
        right: 8px;
      }
      .language-toggle {
        top: 142px;
        right: 8px;
        padding: 6px 12px;
        font-size: 0.85rem;
        min-width: 70px;
      }
      .popup {
        padding: 20px 15px;
        margin: 15px;
      }
    }

    /* Dark mode styles */
    body.dark-mode {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #404040;
      --label: #ffffff;
      --input: #e5e5e5;
      --subtle: #a0a0a0;
      --accent-light: #1a1a1a;
    }

    body.dark-mode {
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #2d2d2d 100%);
    }

    body.dark-mode::before {
      background: 
        radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
    }
  </style>
</head>
<body>
  <button class="sidebar-hamburger" id="menuToggle" aria-label="Toggle Menu">
    <i class="fas fa-bars"></i>
    <i class="fas fa-times"></i>
  </button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <button class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun"></i>
  </button>
  <button class="language-toggle" id="languageToggle">ಕನ್ನಡ</button>
  <div class="app-flex">
    <div class="sidebar" id="sidebar">
      <div>
        <div class="brand">
          <img style="width:180px" src="./logo.png"/>
        </div>
        <hr>
        <ul>
          <li><a href="./home.html"><img src="./assets/home_1299859.png" alt="Home" class="sidebar-icon"> <span class="translate" data-en="Home" data-kn="ಮುಖಪುಟ">Home</span></a></li>
          <li><a href="./attendance.html"><img src="./assets/attendance.png" alt="Attendance" class="sidebar-icon"> <span class="translate" data-en="Attendance" data-kn="ಹಾಜರಾತಿ">Attendance</span></a></li>
          <li><a href="./assignments.html"><img src="./assets/assignements.png" alt="Assignments" class="sidebar-icon"> <span class="translate" data-en="Assignments" data-kn="ಮನೆಕೆಲಸ">Assignments</span></a></li>
          <li><a href="./time_table.html"><img src="./assets/time table.png" alt="Timetable" class="sidebar-icon"> <span class="translate" data-en="Timetable" data-kn="ಸಮಯ ಕೋಷ್ಟಕ">Timetable</span></a></li>
          <li><a href="./marks.html"><img src="./assets/marks upload.png" alt="Marks" class="sidebar-icon"> <span class="translate" data-en="Marks" data-kn="ಅಂಕಗಳು">Marks</span></a></li>
          <li><a href="./performance.html"><img src="./assets/performance.png" alt="Performance" class="sidebar-icon"> <span class="translate" data-en="Performance" data-kn="ಕಾರ್ಯಸಾಧನೆ">Performance</span></a></li>
          <li><a href="./gallery.html"><img src="./assets/view gallery.png" alt="Gallery" class="sidebar-icon"> <span class="translate" data-en="Gallery" data-kn="ಚಿತ್ರಶಾಲೆ">Gallery</span></a></li>
          <li><a href="./announcement.html"><img src="./assets/announcement.png" alt="Announcement" class="sidebar-icon"> <span class="translate" data-en="Announcement" data-kn="ಪ್ರಕಟಣೆ">Announcement</span></a></li>
          <li><a href="./communication.html"><img src="./assets/communication.png" alt="Communication" class="sidebar-icon"> <span class="translate" data-en="Communication" data-kn="ಸಂವಹನ">Communication</span></a></li>
          <li><a href="./explore.html"><img src="./assets/explore.png" alt="Explore" class="sidebar-icon"> <span class="translate" data-en="Explore" data-kn="ಅನ್ವೇಷಿಸಿ">Explore</span></a></li>
          <li><a href="./fees.html"><img src="./assets/fees.png" alt="Fees" class="sidebar-icon"> <span class="translate" data-en="Fees" data-kn="ಶುಲ್ಕ">Fees</span></a></li>
          <li><a href="./changePassword.html" class="active"><img src="./assets/change password.png" alt="Change Password" class="sidebar-icon"> <span class="translate" data-en="Change Password" data-kn="ಗುಪ್ತಪದ ಬದಲಾಯಿಸಿ">Change Password</span></a></li>
        </ul>
      </div>
      <div class="logout">
        <a href="#" onclick="logout()"><i class="fas fa-right-from-bracket"></i> <span class="translate" data-en="Logout" data-kn="ನಿರ್ಗಮಿಸು">Logout</span></a>
      </div>
    </div>
    <div class="main-content" id="mainContent">
      <div class="top-bar">
      </div>

      <form class="change-password-container" id="changePasswordForm" autocomplete="off">
        <div class="change-password-header">
          <i class="fas fa-lock"></i>
          <h2>
            Change Your
            Password
          </h2>
        </div>
        <label class="change-password-label">Enter Old Password</label>
        <div class="cp-form-group">
          <input type="password" class="cp-input" id="oldPassword" placeholder="Enter Old Password" required autocomplete="current-password" />
          <i class="far fa-eye cp-eye" data-target="oldPassword"></i>
        </div>
        <div class="cp-form-group">
          <input type="password" class="cp-input" id="newPassword" placeholder="Enter New Password" required autocomplete="new-password" />
          <i class="far fa-eye cp-eye" data-target="newPassword"></i>
        </div>
        <div class="cp-form-group">
          <input type="password" class="cp-input" id="confirmPassword" placeholder="Confirm New Password" required autocomplete="new-password" />
          <i class="far fa-eye cp-eye" data-target="confirmPassword"></i>
        </div>
        <div class="cp-btn-row">
          <button type="reset" class="cp-btn cp-btn-reset" id="resetBtn">Reset</button>
          <button type="submit" class="cp-btn cp-btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Custom Popup -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <div class="popup-icon" id="popupIcon">
        <i class="fas fa-check-circle"></i>
      </div>
      <div class="popup-title" id="popupTitle">Success!</div>
      <div class="popup-message" id="popupMessage">Your password has been changed successfully.</div>
      <button class="popup-btn" id="popupBtn" onclick="closePopup()">OK</button>
    </div>
  </div>

  <script>
    // Sidebar functionality
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const mainContent = document.getElementById('mainContent');
    let menuOpen = false;

    function openSidebar() {
      menuOpen = true;
      sidebar.classList.add('menu-open');
      menuToggle.classList.add('menu-open');
      sidebarOverlay.classList.add('active');
      document.body.classList.add('sidebar-open');
    }
    
    function closeSidebar() {
      menuOpen = false;
      sidebar.classList.remove('menu-open');
      menuToggle.classList.remove('menu-open');
      sidebarOverlay.classList.remove('active');
      document.body.classList.remove('sidebar-open');
    }
    
    menuToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!menuOpen) openSidebar();
      else closeSidebar();
    });
    
    sidebarOverlay.addEventListener('click', function() {
      closeSidebar();
    });

    // Close sidebar on window resize
    window.addEventListener('resize', function() {
      if (window.innerWidth > 768) {
        closeSidebar();
        sidebar.style.left = '0';
        mainContent.style.marginLeft = 'var(--sidebar-width)';
      } else {
        sidebar.style.left = '-245px';
        mainContent.style.marginLeft = '0';
      }
    });

    // Prevent sidebar clicks from closing the sidebar
    sidebar.addEventListener('click', function(e) {
      e.stopPropagation();
    });

    // Theme toggle functionality
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    let isDarkMode = false;

    themeToggle.addEventListener('click', function() {
      isDarkMode = !isDarkMode;
      
      if (isDarkMode) {
        document.body.classList.add('dark-mode');
        themeIcon.className = 'fas fa-moon';
      } else {
        document.body.classList.remove('dark-mode');
        themeIcon.className = 'fas fa-sun';
      }
    });

    // Password eye toggle logic
    document.querySelectorAll('.cp-eye').forEach(eye => {
      eye.addEventListener('click', function () {
        const targetId = this.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (input.type === 'password') {
          input.type = 'text';
          this.classList.remove('fa-eye');
          this.classList.add('fa-eye-slash');
        } else {
          input.type = 'password';
          this.classList.remove('fa-eye-slash');
          this.classList.add('fa-eye');
        }
      });
    });

    // Reset functionality
    document.getElementById('resetBtn').addEventListener('click', function (e) {
      setTimeout(() => {
        document.querySelectorAll('.cp-input').forEach(input => input.type = 'password');
        document.querySelectorAll('.cp-eye').forEach(eye => {
          eye.classList.add('fa-eye');
          eye.classList.remove('fa-eye-slash');
        });
      }, 1); // Small timeout to allow reset to clear fields first
    });

    // Custom Popup Functions
    function showPopup(type, title, message) {
      const popupOverlay = document.getElementById('popupOverlay');
      const popupIcon = document.getElementById('popupIcon');
      const popupTitle = document.getElementById('popupTitle');
      const popupMessage = document.getElementById('popupMessage');
      
      // Set icon based on type
      const iconElement = popupIcon.querySelector('i');
      iconElement.className = '';
      
      if (type === 'success') {
        iconElement.classList.add('fas', 'fa-check-circle');
        popupIcon.className = 'popup-icon success';
      } else if (type === 'error') {
        iconElement.classList.add('fas', 'fa-times-circle');
        popupIcon.className = 'popup-icon error';
      } else if (type === 'warning') {
        iconElement.classList.add('fas', 'fa-exclamation-triangle');
        popupIcon.className = 'popup-icon warning';
      }
      
      popupTitle.textContent = title;
      popupMessage.textContent = message;
      popupOverlay.classList.add('show');
    }

    function closePopup() {
      document.getElementById('popupOverlay').classList.remove('show');
    }

    // Form submission
    document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      // Validation
      if (!oldPassword || !newPassword || !confirmPassword) {
        showPopup('error', 'Error!', 'Please fill in all fields.');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        showPopup('error', 'Error!', 'New password and confirm password do not match.');
        return;
      }
      
      if (newPassword.length < 8) {
        showPopup('error', 'Error!', 'New password must be at least 8 characters long.');
        return;
      }
      
      if (oldPassword === newPassword) {
        showPopup('error', 'Error!', 'New password must be different from the old password.');
        return;
      }
      
      // Simulate password change
      showPopup('success', 'Success!', 'Your password has been changed successfully.');
      
      // Reset form
      setTimeout(() => {
        document.getElementById('changePasswordForm').reset();
        document.querySelectorAll('.cp-input').forEach(input => input.type = 'password');
        document.querySelectorAll('.cp-eye').forEach(eye => {
          eye.classList.add('fa-eye');
          eye.classList.remove('fa-eye-slash');
        });
      }, 2000);
    });

    // Close popup when clicking outside
    document.getElementById('popupOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closePopup();
      }
    });
  </script>

  <!-- Include the authentication system -->
  <script src="../js/auth-protected.js"></script>
  <script src="../js/user-session.js"></script>
  <script src="../js/professional-logout.js"></script>
  
  <script>
    // Authentication check and user tracking for Parents Module
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for auth system to load
      setTimeout(() => {
        if (window.UserSession) {
          const userData = window.UserSession.getUserData();
          if (userData && userData.isAuthenticated) {
            // 🛡️ SECURITY CHECK: Verify user is actually a parent
            if (userData.userType !== 'parents' && userData.userType !== 'parent') {
              console.log('❌ UNAUTHORIZED ACCESS DENIED:', userData.userType, 'trying to access parents module');
              console.log('🚨 Security Alert: User', userData.displayName, 'with role', userData.userType, 'attempted to access parent-only content');
              
              // Show security alert and redirect
              alert(`🚫 Access Denied!\n\nThis module is restricted to parents only.\nYour current role: ${userData.userType}\n\nYou will be redirected to the login page.`);
              
              // Clear potentially compromised session
              window.UserSession.clearUserData();
              window.location.href = '../login.html';
              return;
            }
            
            console.log('✅ Parent authentication successful for changePassword:', userData);
            
            // Update UI with parent information
            updateParentUI(userData);
            
            // Track parent activity
            trackParentActivity(userData);
            
          } else {
            console.log('❌ No valid session found, redirecting to login');
            window.location.href = '../login.html';
          }
        } else {
          console.error('❌ UserSession not available, redirecting to login');
          window.location.href = '../login.html';
        }
      }, 100);
    });

    // Update UI with parent information
    function updateParentUI(userData) {
      // Update any user display elements
      const userNameElements = document.querySelectorAll('.user-name, .parent-name, .welcome-text');
      userNameElements.forEach(element => {
        if (userData.name || userData.displayName) {
          element.textContent = `Welcome, ${userData.name || userData.displayName}`;
        }
      });

      // Update parent ID if displayed
      const parentIdElements = document.querySelectorAll('.parent-id');
      parentIdElements.forEach(element => {
        if (userData.parent_userId || userData.id) {
          element.textContent = `Parent ID: ${userData.parent_userId || userData.id}`;
        }
      });

      console.log('✅ Parent UI updated with user data');
    }

    // Track parent activity for security monitoring
    function trackParentActivity(userData) {
      const activityData = {
        timestamp: new Date().toISOString(),
        userType: userData.userType,
        userId: userData.parent_userId || userData.id,
        page: 'changePassword',
        action: 'page_access'
      };
      
      console.log('📊 Parent activity tracked:', activityData);
      
      // Store activity in session storage for security monitoring
      const activities = JSON.parse(sessionStorage.getItem('parent_activities') || '[]');
      activities.push(activityData);
      
      // Keep only last 10 activities
      if (activities.length > 10) {
        activities.splice(0, activities.length - 10);
      }
      
      sessionStorage.setItem('parent_activities', JSON.stringify(activities));
    }

    // Enhanced security: Monitor for suspicious activity
    function monitorParentSecurity() {
      const activities = JSON.parse(sessionStorage.getItem('parent_activities') || '[]');
      const recentActivities = activities.filter(activity => {
        const activityTime = new Date(activity.timestamp);
        const fiveMinutesAgo = new Date(Date.now() - 5 * 60 * 1000);
        return activityTime > fiveMinutesAgo;
      });

      if (recentActivities.length > 20) {
        console.warn('🚨 SECURITY WARNING: Unusual parent activity detected');
        // Could implement additional security measures here
      }
    }

    // Run security monitoring every minute
    setInterval(monitorParentSecurity, 60000);

    // Language Toggle Functionality
    let currentLanguage = localStorage.getItem('selectedLanguage') || 'en';

    function switchLanguage() {
      currentLanguage = currentLanguage === 'en' ? 'kn' : 'en';
      localStorage.setItem('selectedLanguage', currentLanguage);
      applyLanguage();
    }

    function applyLanguage() {
      const languageToggle = document.getElementById('languageToggle');
      languageToggle.textContent = currentLanguage === 'en' ? 'ಕನ್ನಡ' : 'English';
      
      const translatableElements = document.querySelectorAll('.translate');
      translatableElements.forEach(element => {
        const enText = element.getAttribute('data-en');
        const knText = element.getAttribute('data-kn');
        if (enText && knText) {
          element.textContent = currentLanguage === 'en' ? enText : knText;
        }
      });
    }

    document.getElementById('languageToggle').addEventListener('click', switchLanguage);
    window.addEventListener('load', function() { applyLanguage(); });

    // Professional logout function for parents
    function logout() {
      if (window.professionalLogout) {
        window.professionalLogout.triggerLogout();
      } else {
        // Fallback implementation
        if (confirm('Are you sure you want to log out?')) {
          localStorage.clear();
          sessionStorage.clear();
          window.location.href = '../login.html';
        }
      }
    }
  </script>
