<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width"/>
  <title>BC360 - Parent Announcements</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      /* Parents Module Professional Color Scheme */
      --sidebar1: #2c5530;
      --sidebar2: #4a7c59;
      --sidebar-shadow: 0 4px 26px rgba(44, 85, 48, 0.15);
      --sidebar-width: 245px;
      --accent: #e67e22;
      --accent-light: #fdf2e9;
      --bg: #f8f9fa;
      --card: #ffffff;
      --border: #e9ecef;
      --label: #2c3e50;
      --input: #495057;
      --subtle: #6c757d;
      --error: #dc3545;
      --required: #ffc107;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(44, 85, 48, 0.08);
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --blue: #007bff;
      --red: #dc3545;
      --green: #28a745;
      --purple: #6f42c1;
      --yellow: #ffc107;
      --video-main: #ffffff;
      --video-card: #f8f9fa;
      --video-shadow: 0 4px 20px rgba(44, 85, 48, 0.1);
      --video-shadow-hover: 0 8px 30px rgba(44, 85, 48, 0.15);
      --video-title: #2c3e50;
      --primary-blue: #007bff;
      --primary-teal: #20c997;
      --language-kannada: #6f42c1;
      --language-english: #007bff;
      --drawer-bg: rgba(44, 85, 48, 0.8);
      
      /* Additional Parents-specific colors */
      --warm-orange: #e67e22;
      --warm-orange-light: #f39c12;
      --warm-orange-dark: #d35400;
      --forest-green: #2c5530;
      --forest-green-light: #4a7c59;
      --forest-green-dark: #1e3a23;
      --cream: #fdf2e9;
      --cream-light: #fef9f3;
      --trust-blue: #3498db;
      --trust-blue-light: #5dade2;
      --neutral-gray: #95a5a6;
      --neutral-gray-light: #bdc3c7;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 50%, #dee2e6 100%);
      min-height: 100vh;
      width: 100vw;
      color: var(--input);
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(230, 126, 34, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(44, 85, 48, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(52, 152, 219, 0.05) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .app-flex { display: flex; flex-direction: row; min-height: 100vh; width: 100vw; }
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: linear-gradient(180deg, var(--sidebar1) 0%, var(--sidebar2) 100%);
      color: #fff; display: flex; flex-direction: column;
      justify-content: space-between; box-shadow: var(--sidebar-shadow); z-index: 10; height: 100vh; position: fixed; left: 0; top: 0;
      transition: left 0.28s; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #cce6ff #fff;
    }
    .sidebar::-webkit-scrollbar { width: 6px; background: #f1f5fc;}
    .sidebar::-webkit-scrollbar-thumb { background: #cce6ff; border-radius: 4px;}
    .sidebar .brand { display: flex; align-items: center; justify-content: center; padding: 10px 6px; transition: transform 0.2s; }
    .sidebar .brand img { width: 100%; height: 50px; border-radius: 3px; border: 1.5px solid #fff; background: #fff; object-fit: contain; box-shadow: 0 2px 5px #26bf6720; transition: transform 0.2s, box-shadow 0.2s; }
    .sidebar .brand:hover img { transform: scale(1.05); box-shadow: 0 4px 12px #26bf6740; }
    .sidebar hr { border: 0; border-top: 1.3px solid #ffffff22; margin: 0 12px 16px 12px; }
    .sidebar ul { list-style: none; padding: 0; margin: 0; }
    .sidebar ul li { margin: 0; }
    .sidebar ul li a { color: #fff; font-size: 1.06rem; text-decoration: none; display: flex; align-items: center; padding: 12px 10px 12px 24px; border-radius: 7px 0 0 7px; transition: all 0.22s; font-weight: 500; gap: 13px; position: relative; overflow: hidden; }
    .sidebar ul li a::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%); transition: width 0.3s; }
    .sidebar ul li a:hover::before { width: 100%; }
    .sidebar ul li a.active, .sidebar ul li a:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
    .sidebar .logout { border-top: 1px solid rgba(255,255,255,0.2); margin-top: 15px; padding: 24px 0 28px 10px;}
    .sidebar .logout a { color: #fff; font-size: 1.05rem; text-decoration: none; display: flex; align-items: center; gap: 11px; padding: 10px 12px 10px 24px; border-radius: 6px; transition: all 0.22s; position: relative; overflow: hidden; }
    .sidebar .logout a::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%); transition: width 0.3s; }
    .sidebar .logout a:hover::before { width: 100%; }
    .sidebar .logout a:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
    .sidebar-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      filter: none !important;
      -webkit-filter: none !important;
    }
    .main-content { margin-left: var(--sidebar-width); flex: 1; width: calc(100vw - var(--sidebar-width)); min-height: 100vh; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 0; transition: margin-left 0.28s; z-index: 1; }
    .top-bar { width: 100%; display: flex; align-items: center; justify-content: center; gap: 15px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1.3px solid var(--border); padding: 10px 32px 10px 32px; font-size: 1.32rem; font-weight: 700; letter-spacing: 0.01em; color: var(--accent); position: relative; z-index: 2; box-shadow: 0 2px 8px rgba(44, 85, 48, 0.1); }
    .top-bar .fa-bullhorn { font-size: 2.1rem; color: var(--accent);}
    .sidebar-hamburger { display: none; position: fixed; top: 18px; left: 19px; z-index: 9999; font-size: 2.1rem; background: #fff; color: var(--sidebar1); border: none; border-radius: 7px; padding: 6px 14px 7px 14px; box-shadow: 0 2px 12px rgba(44, 85, 48, 0.15); cursor: pointer; transition: all 0.3s ease;}
    .sidebar-hamburger.menu-open { background: var(--accent-light); color: var(--accent);}
    .sidebar-hamburger:hover { background: var(--accent-light); color: var(--accent); transform: scale(1.05);}
    .sidebar-hamburger .fa-times { display: none;}
    .sidebar-hamburger.menu-open .fa-bars { display: none;}
    .sidebar-hamburger.menu-open .fa-times { display: inline;}
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(44, 85, 48, 0.2); z-index: 899; transition: opacity 0.2s;}
    .sidebar-overlay.active { display: block;}

    .theme-toggle {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-left: auto;
      box-shadow: 0 2px 8px rgba(230, 126, 34, 0.3);
    }

    .theme-toggle:hover {
      background: var(--warm-orange-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(230, 126, 34, 0.4);
    }

    .language-toggle {
      background: linear-gradient(135deg, var(--sidebar1) 0%, var(--sidebar2) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: fixed;
      top: 130px;
      right: 19px;
      z-index: 9998;
      box-shadow: 0 2px 12px rgba(44, 85, 48, 0.25);
      min-width: 80px;
    }

    .language-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(44, 85, 48, 0.35);
    }

    .language-toggle:active {
      transform: translateY(0);
    }

    /* No Announcement Message */
    .no-announcement {
      background: var(--card);
      padding: 40px 32px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: 2rem;
      color: var(--accent);
      font-weight: 600;
      text-align: center;
      min-width: 300px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    
    .no-announcement::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--warm-orange-light));
    }
    
    .no-announcement:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(44, 85, 48, 0.15);
      border-color: var(--accent);
    }



    /* Fee Overview Section */
    .fee-overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .fee-card {
      background: var(--fee-card);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .fee-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), #f59e0b);
    }

    .fee-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--fee-shadow-hover);
      border-color: var(--accent);
    }

    .fee-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .fee-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--accent);
      background: rgba(251, 191, 36, 0.1);
    }

    .fee-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--label);
    }

    .fee-card-amount {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .fee-card-subtitle {
      font-size: 0.9rem;
      color: var(--subtle);
    }

    .fee-card-status {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-paid {
      background: rgba(16, 185, 129, 0.2);
      color: var(--status-paid);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status-pending {
      background: rgba(245, 158, 11, 0.2);
      color: var(--status-pending);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .status-overdue {
      background: rgba(239, 68, 68, 0.2);
      color: var(--status-overdue);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* Fee Breakdown Section */
    .fee-breakdown {
      background: var(--fee-card);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .fee-breakdown-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fee-breakdown-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }

    .fee-item {
      background: var(--fee-main);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .fee-item:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .fee-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .fee-item-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--label);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fee-item-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--accent);
      background: rgba(251, 191, 36, 0.1);
    }

    .fee-item-amount {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .fee-item-details {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .fee-item-label {
      color: var(--subtle);
    }

    .fee-item-value {
      color: var(--label);
      font-weight: 500;
    }

    .fee-item-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.paid {
      background: var(--status-paid);
    }

    .status-dot.pending {
      background: var(--status-pending);
    }

    .status-dot.overdue {
      background: var(--status-overdue);
    }

    /* Receipts Section */
    .receipts-section {
      background: var(--fee-card);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .receipts-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .receipts-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .receipts-filter {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .receipt-filter-select {
      background: var(--fee-main);
      border: 1px solid var(--border);
      color: var(--label);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .receipt-filter-select:hover {
      border-color: var(--accent);
    }

    .receipts-list {
      display: grid;
      gap: 16px;
    }

    .receipt-item {
      background: var(--fee-main);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .receipt-item:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .receipt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .receipt-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .receipt-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--label);
    }

    .receipt-date {
      font-size: 0.9rem;
      color: var(--subtle);
    }

    .receipt-amount {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .receipt-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .receipt-detail {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .receipt-detail-label {
      font-size: 0.8rem;
      color: var(--subtle);
      text-transform: uppercase;
      font-weight: 600;
    }

    .receipt-detail-value {
      font-size: 0.9rem;
      color: var(--label);
      font-weight: 500;
    }

    .receipt-actions {
      display: flex;
      gap: 8px;
    }

    .download-btn {
      padding: 8px 16px;
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .download-btn:hover {
      background: #f59e0b;
      transform: translateY(-1px);
    }

    .print-btn {
      padding: 8px 16px;
      background: var(--fee-main);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

         .print-btn:hover {
      background: var(--accent);
      color: #1a1a1a;
    }

     .receipt-summary {
       background: var(--fee-main);
       border-radius: 8px;
       padding: 16px;
       margin: 16px 0;
       border: 1px solid var(--border);
     }

     .receipt-summary-title {
       font-size: 1rem;
      font-weight: 600;
       color: var(--accent);
       margin-bottom: 12px;
     }

     .receipt-summary-items {
       display: flex;
       flex-direction: column;
       gap: 8px;
     }

     .receipt-summary-item {
       display: flex;
       justify-content: space-between;
       align-items: center;
       padding: 8px 0;
       border-bottom: 1px solid var(--border);
     }

     .receipt-summary-item:last-child {
       border-bottom: none;
       font-weight: 600;
       color: var(--accent);
     }

     .receipt-summary-item span:first-child {
       color: var(--label);
     }

     .receipt-summary-item span:last-child {
       color: var(--accent);
       font-weight: 500;
     }

    /* Statement Section */
    .statement-section {
      background: var(--fee-card);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .statement-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .statement-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .statement-filter {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .statement-filter-select {
      background: var(--fee-main);
      border: 1px solid var(--border);
      color: var(--label);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .statement-filter-select:hover {
      border-color: var(--accent);
    }

    .statement-summary {
      background: var(--fee-main);
      border-radius: 8px;
      padding: 20px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .statement-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .statement-summary-item {
      text-align: center;
    }

    .statement-summary-label {
      font-size: 0.9rem;
      color: var(--subtle);
      margin-bottom: 8px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .statement-summary-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .statement-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .statement-btn {
      padding: 12px 24px;
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .statement-btn:hover {
      background: #f59e0b;
      transform: translateY(-1px);
    }

    .statement-btn.secondary {
      background: var(--fee-main);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .statement-btn.secondary:hover {
      background: var(--accent);
      color: #1a1a1a;
    }





    /* Resume Builder Styles */
    .resume-form {
      background: var(--placement-card);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .form-section {
      margin-bottom: 24px;
    }

    .form-section h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {

  <script>
    // Sidebar logic
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    let menuOpen = false;
    function openSidebar() {
      menuOpen = true; sidebar.classList.add('menu-open');
      menuToggle.classList.add('menu-open'); sidebarOverlay.classList.add('active');
      document.body.classList.add('sidebar-open');
    }
    function closeSidebar() {
      menuOpen = false; sidebar.classList.remove('menu-open');
      menuToggle.classList.remove('menu-open'); sidebarOverlay.classList.remove('active');
      document.body.classList.remove('sidebar-open');
    }
    menuToggle.addEventListener('click', function(e) {
      e.stopPropagation(); (!menuOpen ? openSidebar() : closeSidebar());
    });
    sidebarOverlay.addEventListener('click', function() { closeSidebar(); });
    window.addEventListener('resize', function() {
      if (window.innerWidth > 1150 && menuOpen) closeSidebar();
    });
    sidebar.querySelectorAll('a').forEach(a => {
      a.onclick = () => { if(window.innerWidth <= 1150) closeSidebar(); }
    });

    // Theme toggle functionality
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    let isDarkMode = false; // Start with light mode for parents

    themeToggle.addEventListener('click', function() {
      isDarkMode = !isDarkMode;
      
      if (isDarkMode) {
        // Dark mode for parents - warm dark theme
        document.documentElement.style.setProperty('--bg', '#1a1a1a');
        document.documentElement.style.setProperty('--card', '#2d2d2d');
        document.documentElement.style.setProperty('--video-main', '#2d2d2d');
        document.documentElement.style.setProperty('--video-card', '#3a3a3a');
        document.documentElement.style.setProperty('--border', '#404040');
        document.documentElement.style.setProperty('--label', '#ffffff');
        document.documentElement.style.setProperty('--input', '#e5e5e5');
        document.documentElement.style.setProperty('--subtle', '#a0a0a0');
        document.documentElement.style.setProperty('--accent-light', '#2d2d2d');
        document.documentElement.style.setProperty('--video-title', '#ffffff');
        document.body.style.background = 'linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #3a3a3a 100%)';
        themeIcon.className = 'fas fa-sun';
      } else {
        // Light mode for parents - professional light theme
        document.documentElement.style.setProperty('--bg', '#f8f9fa');
        document.documentElement.style.setProperty('--card', '#ffffff');
        document.documentElement.style.setProperty('--video-main', '#ffffff');
        document.documentElement.style.setProperty('--video-card', '#f8f9fa');
        document.documentElement.style.setProperty('--border', '#e9ecef');
        document.documentElement.style.setProperty('--label', '#2c3e50');
        document.documentElement.style.setProperty('--input', '#495057');
        document.documentElement.style.setProperty('--subtle', '#6c757d');
        document.documentElement.style.setProperty('--accent-light', '#fdf2e9');
        document.documentElement.style.setProperty('--video-title', '#2c3e50');
        document.body.style.background = 'linear-gradient(135deg, #f8f9fa 0%, #e9ecef 50%, #dee2e6 100%)';
        themeIcon.className = 'fas fa-moon';
      }
    });

  </script>

  <!-- Include the authentication system -->
  <script src="../js/auth-protected.js"></script>
  <script src="../js/user-session.js"></script>
  <script src="../js/professional-logout.js"></script>
  
  <script>
    // Authentication check and user tracking for Parents Module
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for auth system to load
      setTimeout(() => {
        if (window.UserSession) {
          const userData = window.UserSession.getUserData();
          if (userData && userData.isAuthenticated) {
            // 🛡️ SECURITY CHECK: Verify user is actually a parent
            if (userData.userType !== 'parents' && userData.userType !== 'parent') {
              console.log('❌ UNAUTHORIZED ACCESS DENIED:', userData.userType, 'trying to access parents module');
              console.log('🚨 Security Alert: User', userData.displayName, 'with role', userData.userType, 'attempted to access parent-only content');
              
              // Show security alert and redirect
              alert(`🚫 Access Denied!\n\nThis module is restricted to parents only.\nYour current role: ${userData.userType}\n\nYou will be redirected to the login page.`);
              
              // Clear potentially compromised session
              window.UserSession.clearUserData();
              window.location.href = '../login.html';
              return;
            }
            
            console.log('✅ Parent authentication successful:', userData);
            
            // Update UI with parent information
            updateParentUI(userData);
            
            // Track parent activity
            trackParentActivity(userData);
            
          } else {
            console.log('❌ No valid session found, redirecting to login');
            window.location.href = '../login.html';
          }
        } else {
          console.error('❌ UserSession not available, redirecting to login');
          window.location.href = '../login.html';
        }
      }, 100);
    });

    // Update UI with parent information
    function updateParentUI(userData) {
      // Update any user display elements
      const userNameElements = document.querySelectorAll('.user-name, .parent-name, .welcome-text');
      userNameElements.forEach(element => {
        if (userData.name || userData.displayName) {
          element.textContent = `Welcome, ${userData.name || userData.displayName}`;
        }
      });

      // Update parent ID if displayed
      const parentIdElements = document.querySelectorAll('.parent-id');
      parentIdElements.forEach(element => {
        if (userData.parent_userId || userData.id) {
          element.textContent = `Parent ID: ${userData.parent_userId || userData.id}`;
        }
      });

      console.log('✅ Parent UI updated with user data');
    }

    // Track parent activity for security monitoring
    function trackParentActivity(userData) {
      const activityData = {
        timestamp: new Date().toISOString(),
        userType: userData.userType,
        userId: userData.parent_userId || userData.id,
        page: 'announcement',
        action: 'page_access'
      };
      
      console.log('📊 Parent activity tracked:', activityData);
      
      // Store activity in session storage for security monitoring
      const activities = JSON.parse(sessionStorage.getItem('parent_activities') || '[]');
      activities.push(activityData);
      
      // Keep only last 10 activities
      if (activities.length > 10) {
        activities.splice(0, activities.length - 10);
      }
      
      sessionStorage.setItem('parent_activities', JSON.stringify(activities));
    }

    // Enhanced security: Monitor for suspicious activity
    function monitorParentSecurity() {
      const activities = JSON.parse(sessionStorage.getItem('parent_activities') || '[]');
      const recentActivities = activities.filter(activity => {
        const activityTime = new Date(activity.timestamp);
        const fiveMinutesAgo = new Date(Date.now() - 5 * 60 * 1000);
        return activityTime > fiveMinutesAgo;
      });

      if (recentActivities.length > 20) {
        console.warn('🚨 SECURITY WARNING: Unusual parent activity detected');
        // Could implement additional security measures here
      }
    }

    // Run security monitoring every minute
    setInterval(monitorParentSecurity, 60000);

    // Language Toggle Functionality
    let currentLanguage = localStorage.getItem('selectedLanguage') || 'en'; // Load saved language or default to English

    function switchLanguage() {
      currentLanguage = currentLanguage === 'en' ? 'kn' : 'en';
      localStorage.setItem('selectedLanguage', currentLanguage);
      applyLanguage();
    }

    function applyLanguage() {
      const languageToggle = document.getElementById('languageToggle');
      languageToggle.textContent = currentLanguage === 'en' ? 'ಕನ್ನಡ' : 'English';
      
      const translatableElements = document.querySelectorAll('.translate');
      translatableElements.forEach(element => {
        const enText = element.getAttribute('data-en');
        const knText = element.getAttribute('data-kn');
        if (enText && knText) {
          element.textContent = currentLanguage === 'en' ? enText : knText;
        }
      });
    }

    // Add event listener for language toggle
    document.getElementById('languageToggle').addEventListener('click', switchLanguage);
    
    // Apply saved language on page load
    window.addEventListener('load', function() {
      applyLanguage();
    });

    // Professional logout function for parents
    function logout() {
      if (window.professionalLogout) {
        window.professionalLogout.triggerLogout();
      } else {
        // Fallback implementation
        if (confirm('Are you sure you want to log out?')) {
          localStorage.clear();
          sessionStorage.clear();
          window.location.href = '../login.html';
        }
      }
    }
  </script>
</body>
