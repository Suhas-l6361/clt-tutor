<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads — CRM</title>
  <link rel="icon" type="image/png" href="../image/Clat%20Logo.png" />
  <link rel="shortcut icon" type="image/png" href="../image/Clat%20Logo.png" />
  <link rel="apple-touch-icon" href="../image/Clat%20Logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Shrikhand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/app.css" />
  <link rel="stylesheet" href="../css/crm-shell.css" />
</head>
<body class="app-body crm-dashboard">
  <div id="stock" style="display: none">
    <div class="card" style="margin-bottom: 1.35rem">
      <h3 style="margin: 0 0 1rem; font-size: 1.08rem; display: flex; align-items: center; gap: 0.5rem">
        <i class="fa-solid fa-user-plus" style="color: var(--accent)"></i> Capture new lead
      </h3>
      <form id="form-lead">
        <div class="crm-form-grid">
          <div class="form-group" style="margin: 0">
            <label for="l-name">Name</label>
            <div class="input-wrap">
              <i class="fa-solid fa-user"></i>
              <input id="l-name" name="name" required placeholder="Full name" />
            </div>
          </div>
          <div class="form-group" style="margin: 0">
            <label for="l-email">Email</label>
            <div class="input-wrap">
              <i class="fa-solid fa-envelope"></i>
              <input id="l-email" name="email" type="email" placeholder="email@…" />
            </div>
          </div>
          <div class="form-group" style="margin: 0">
            <label for="l-phone">Phone</label>
            <div class="input-wrap">
              <i class="fa-solid fa-phone"></i>
              <input id="l-phone" name="phone" placeholder="Mobile" />
            </div>
          </div>
          <div class="form-group" style="margin: 0">
            <label for="l-source">Source</label>
            <div class="input-wrap">
              <i class="fa-solid fa-bullseye"></i>
              <select id="l-source" name="source">
                <option>Walk-in</option>
                <option>Referral</option>
                <option>Website</option>
                <option>Social</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin: 0">
            <label for="l-course">Interest</label>
            <div class="input-wrap">
              <i class="fa-solid fa-book"></i>
              <input id="l-course" name="courseInterest" placeholder="Program / batch" />
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem"><i class="fa-solid fa-plus"></i> Save lead</button>
      </form>
    </div>
    <div class="table-toolbar">
      <div>
        <strong style="font-size: 1.05rem">Pipeline</strong>
        <span id="lead-count" class="text-muted" style="font-weight: 500; margin-left: 0.35rem"></span>
      </div>
      <span class="text-muted" style="font-size: 0.85rem"><i class="fa-solid fa-arrows-rotate"></i> Change stage inline · <i class="fa-solid fa-graduation-cap"></i> converts to student</span>
    </div>
    <div class="table-wrap">
      <table id="leads-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Contact</th>
            <th>Source</th>
            <th>Interest</th>
            <th>Stage</th>
            <th style="width: 3.5rem"></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <div id="app-root" class="app-shell"></div>

  <script src="../js/config.js"></script>
  <script src="../js/data-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/guard.js"></script>
  <script src="../js/site-protection.js" data-protection-mode="app"></script>
  <script src="../js/nav.js?v=20260420"></script>
  <script src="../js/crm-chrome.js"></script>
  <script>
    function renderLeads() {
      var tbody = document.querySelector('#leads-table tbody');
      var leads = DataStore.leads();
      var countEl = document.getElementById('lead-count');
      if (countEl) countEl.textContent = '· ' + leads.length + ' total';
      tbody.innerHTML = leads
        .map(function (l) {
          return (
            '<tr data-id="' +
            l.id +
            '"><td><strong>' +
            escapeHtml(l.name) +
            '</strong></td><td>' +
            escapeHtml(l.email || '—') +
            '<br><small class="text-muted">' +
            escapeHtml(l.phone || '') +
            '</small></td><td>' +
            escapeHtml(l.source) +
            '</td><td>' +
            escapeHtml(l.courseInterest || '—') +
            '</td><td><select class="stage-select" data-id="' +
            l.id +
            '">' +
            ['new', 'contacted', 'enrolled', 'lost']
              .map(function (s) {
                return '<option value="' + s + '"' + (l.stage === s ? ' selected' : '') + '>' + s + '</option>';
              })
              .join('') +
            '</select></td><td><button type="button" class="btn btn-ghost btn-icon-only btn-enroll" data-id="' +
            l.id +
            '" title="Convert to student"><i class="fa-solid fa-graduation-cap"></i></button></td></tr>'
          );
        })
        .join('');
    }

    function escapeHtml(s) {
      if (!s) return '';
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', function () {
      var stock = document.getElementById('stock');
      initAppChrome({ role: 'crm', active: 'leads.html', title: 'Leads', contentEl: stock });
      if (typeof applyCrmChrome === 'function') applyCrmChrome();

      renderLeads();

      document.getElementById('form-lead').addEventListener('submit', function (e) {
        e.preventDefault();
        var fd = new FormData(e.target);
        DataStore.addLead({
          name: fd.get('name'),
          email: fd.get('email'),
          phone: fd.get('phone'),
          source: fd.get('source'),
          courseInterest: fd.get('courseInterest'),
          stage: 'new',
        });
        e.target.reset();
        renderLeads();
      });

      document.querySelector('#leads-table tbody').addEventListener('change', function (e) {
        if (!e.target.classList.contains('stage-select')) return;
        var id = e.target.getAttribute('data-id');
        DataStore.updateLead(id, { stage: e.target.value });
      });

      document.querySelector('#leads-table tbody').addEventListener('click', function (e) {
        var btn = e.target.closest('.btn-enroll');
        if (!btn) return;
        var id = btn.getAttribute('data-id');
        var lead = DataStore.leads().find(function (x) {
          return x.id === id;
        });
        if (!lead) return;
        DataStore.addStudent({
          name: lead.name,
          email: lead.email,
          batch: lead.courseInterest || 'General',
        });
        DataStore.updateLead(id, { stage: 'enrolled' });
        DataStore.addComm({
          relatedType: 'lead',
          relatedId: id,
          channel: 'system',
          message: 'Lead converted to student from CRM.',
        });
        renderLeads();
        alert('Student record created from this lead.');
      });
    });
  </script>
</body>
</html>
