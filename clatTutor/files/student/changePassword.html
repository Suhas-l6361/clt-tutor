<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password - Student</title>
  <link rel="icon" type="image/png" href="../image/Clat%20Logo.png" />
  <link rel="shortcut icon" type="image/png" href="../image/Clat%20Logo.png" />
  <link rel="apple-touch-icon" href="../image/Clat%20Logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Shrikhand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/app.css" />
  <link rel="stylesheet" href="../css/student-shell.css" />
  <link rel="stylesheet" href="../css/friendly-popup.css" />
  <style>
    .cp-wrap { max-width: 620px; margin: 0 auto; }
    .cp-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 1rem; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04); }
    .cp-title { margin: 0 0 0.35rem; font-size: 1.1rem; }
    .cp-sub { margin: 0 0 1rem; color: var(--muted); font-size: 0.9rem; }
    .cp-grid { display: grid; gap: 0.8rem; }
    .cp-grid label { display: block; margin-bottom: 0.35rem; font-weight: 600; font-size: 0.85rem; color: #344054; }
    .cp-grid input { width: 100%; border: 1px solid #d4dae4; border-radius: 10px; padding: 0.66rem 0.72rem; font-size: 0.92rem; }
    .cp-grid input:focus { outline: none; border-color: #111; box-shadow: 0 0 0 2px rgba(17, 17, 17, 0.06); }
    .cp-pass-wrap { position: relative; }
    .cp-pass-wrap input { padding-right: 2.6rem; }
    .cp-pass-toggle {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      color: #475467;
      border-radius: 8px;
      cursor: pointer;
    }
    .cp-pass-toggle:hover { background: #f4f6f8; color: #111827; }
    .cp-actions { display: flex; gap: 0.65rem; margin-top: 0.2rem; }
    .cp-actions button { flex: 1; border-radius: 10px; padding: 0.66rem 0.7rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
    .cp-submit { background: #ffcc00; color: #111; border-color: #e6b800; }
    .cp-cancel { background: #fff; color: #1f2937; border-color: #d4dae4; }
    .cp-cancel:hover { background: #f8fafc; border-color: #cbd5e1; }
  </style>
  <script src="../js/site-protection.js" data-protection-mode="app"></script>
</head>
<body class="app-body student-dashboard">
  <div id="stock" style="display:none;">
    <div class="cp-wrap">
      <section class="cp-card">
        <h2 class="cp-title">Change Password</h2>
        <p class="cp-sub">Enter your current password and set a new one.</p>
        <form id="change-password-form" class="cp-grid">
          <div>
            <label for="current-password">Current Password</label>
            <div class="cp-pass-wrap">
              <input id="current-password" name="currentPassword" type="password" autocomplete="current-password" required />
              <button type="button" class="cp-pass-toggle" data-toggle-password="current-password" aria-label="Show current password">
                <i class="fa-regular fa-eye" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div>
            <label for="new-password">New Password</label>
            <div class="cp-pass-wrap">
              <input id="new-password" name="newPassword" type="password" autocomplete="new-password" required />
              <button type="button" class="cp-pass-toggle" data-toggle-password="new-password" aria-label="Show new password">
                <i class="fa-regular fa-eye" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div>
            <label for="confirm-password">Confirm Password</label>
            <div class="cp-pass-wrap">
              <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required />
              <button type="button" class="cp-pass-toggle" data-toggle-password="confirm-password" aria-label="Show confirm password">
                <i class="fa-regular fa-eye" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div class="cp-actions">
            <button type="button" class="cp-cancel" id="cancel-password-btn">Cancel</button>
            <button type="submit" class="cp-submit" id="submit-password-btn">Submit</button>
          </div>
        </form>
      </section>
    </div>
  </div>
  <div id="app-root" class="app-shell"></div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/student-access.js"></script>
  <script src="../js/guard.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/student-chrome.js"></script>
  <script src="../js/friendly-popup.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var stock = document.getElementById('stock');
      initAppChrome({ role: 'student', active: 'changePassword.html', title: 'Change Password', contentEl: stock });
      if (typeof applyStudentChrome === 'function') applyStudentChrome();

      var STUDENT_GENERAL_INFO_API = (window.APP_CONFIG && window.APP_CONFIG.STUDENT_GENERAL_INFO_API)
        || 'https://qxzcr95mqb.execute-api.ap-south-1.amazonaws.com/dev/student_general_info';
      var form = document.getElementById('change-password-form');
      var currentInput = document.getElementById('current-password');
      var newInput = document.getElementById('new-password');
      var confirmInput = document.getElementById('confirm-password');
      var cancelBtn = document.getElementById('cancel-password-btn');
      var submitBtn = document.getElementById('submit-password-btn');
      var toggleButtons = document.querySelectorAll('[data-toggle-password]');

      function popup(type, message) {
        if (typeof showFriendlyPopup === 'function') {
          showFriendlyPopup({ type: type, message: message });
          return;
        }
      }

      function setSubmitting(isSubmitting) {
        submitBtn.disabled = !!isSubmitting;
        submitBtn.textContent = isSubmitting ? 'Submitting...' : 'Submit';
      }

      function resetVisibilityState() {
        Array.prototype.forEach.call(toggleButtons, function (btn) {
          var inputId = btn.getAttribute('data-toggle-password');
          var input = inputId ? document.getElementById(inputId) : null;
          if (!input) return;
          input.type = 'password';
          btn.setAttribute('aria-label', 'Show ' + inputId.replace('-', ' ') + ' password');
          btn.innerHTML = '<i class="fa-regular fa-eye" aria-hidden="true"></i>';
        });
      }

      function resetForm() {
        form.reset();
        resetVisibilityState();
      }

      cancelBtn.addEventListener('click', resetForm);
      Array.prototype.forEach.call(toggleButtons, function (btn) {
        btn.addEventListener('click', function () {
          var inputId = btn.getAttribute('data-toggle-password');
          var input = inputId ? document.getElementById(inputId) : null;
          if (!input) return;
          var show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          btn.setAttribute('aria-label', (show ? 'Hide ' : 'Show ') + inputId.replace('-', ' ') + ' password');
          btn.innerHTML = show
            ? '<i class="fa-regular fa-eye-slash" aria-hidden="true"></i>'
            : '<i class="fa-regular fa-eye" aria-hidden="true"></i>';
        });
      });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var currentPassword = String(currentInput.value || '').trim();
        var newPassword = String(newInput.value || '').trim();
        var confirmPassword = String(confirmInput.value || '').trim();
        var session = Auth.getSession ? Auth.getSession() : null;
        var user = session && session.user ? session.user : null;
        var studentId = user && user.student_id != null ? String(user.student_id).trim() : '';
        var email = user && user.email ? String(user.email).trim() : '';

        if (!currentPassword || !newPassword || !confirmPassword) {
          popup('error', 'Please fill all password fields.');
          return;
        }
        if (newPassword !== confirmPassword) {
          popup('error', 'New password and confirm password do not match.');
          return;
        }
        if (newPassword.length < 4) {
          popup('error', 'New password must be at least 4 characters.');
          return;
        }
        if (!studentId && !email) {
          popup('error', 'Student session not found. Please login again.');
          return;
        }

        setSubmitting(true);
        try {
          var query = studentId
            ? ('student_id=' + encodeURIComponent(studentId))
            : ('email=' + encodeURIComponent(email));
          var profileRes = await fetch(STUDENT_GENERAL_INFO_API + '?' + query, { method: 'GET' });
          var rows = await profileRes.json();
          if (!profileRes.ok || !Array.isArray(rows) || !rows.length) {
            popup('error', 'Unable to verify current password right now.');
            return;
          }

          var row = rows[0] || {};
          var backendPassword = row.password != null ? String(row.password) : '';
          if (!backendPassword) {
            popup('error', 'Current password verification is not available at the moment.');
            return;
          }
          if (backendPassword !== currentPassword) {
            popup('error', 'Current password is incorrect.');
            return;
          }

          var targetStudentId = row.student_id != null ? Number(row.student_id) : Number(studentId);
          if (!targetStudentId || Number.isNaN(targetStudentId)) {
            popup('error', 'Unable to identify student account for update.');
            return;
          }

          var updateRes = await fetch(STUDENT_GENERAL_INFO_API, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              student_id: targetStudentId,
              password: newPassword
            })
          });
          var updateData = {};
          try { updateData = await updateRes.json(); } catch (_) {}
          if (!updateRes.ok) {
            popup('error', (updateData && updateData.message) || 'Unable to update password.');
            return;
          }

          popup('success', (updateData && updateData.message) || 'Password changed successfully.');
          resetForm();
        } catch (_) {
          popup('error', 'Network issue. Please try again.');
        } finally {
          setSubmitting(false);
        }
      });
    });
  </script>
</body>
</html>
