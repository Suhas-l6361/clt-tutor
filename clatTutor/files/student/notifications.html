<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Student</title>
  <link rel="icon" type="image/png" href="../image/Clat%20Logo.png" />
  <link rel="shortcut icon" type="image/png" href="../image/Clat%20Logo.png" />
  <link rel="apple-touch-icon" href="../image/Clat%20Logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Shrikhand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/app.css" />
  <link rel="stylesheet" href="../css/student-shell.css" />
</head>
<body class="app-body student-dashboard">
  <div id="stock" style="display: none">
    <p class="text-muted" style="margin-top: 0; margin-bottom: 1.25rem">
      <i class="fa-solid fa-bell" style="color: var(--accent); margin-right: 0.35rem"></i>
      Institute updates, deadlines, and reminders for your account.
    </p>
    <div id="notif-list"></div>
  </div>
  <div id="app-root" class="app-shell"></div>

  <script src="../js/config.js"></script>
  <script src="../js/data-store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/student-access.js"></script>
  <script src="../js/guard.js"></script>
  <script src="../js/site-protection.js" data-protection-mode="app"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/student-chrome.js"></script>
  <script>
    function formatDate(iso) {
      try {
        return new Date(iso).toLocaleString();
      } catch {
        return iso;
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      var stock = document.getElementById('stock');
      initAppChrome({
        role: 'student',
        active: 'notifications.html',
        title: 'Notifications',
        contentEl: stock,
      });
      applyStudentChrome();
      var list = document.getElementById('notif-list');
      var items = DataStore.notificationsForViewer('student');
      if (!items.length) {
        list.innerHTML =
          '<div class="card" style="text-align:center;padding:2rem"><i class="fa-regular fa-bell-slash fa-2x" style="color:var(--muted);margin-bottom:0.75rem"></i><p class="text-muted" style="margin:0">No notifications yet.</p></div>';
        return;
      }
      list.innerHTML = items
        .map(function (n) {
          return (
            '<article class="notif-item">' +
            '<div><strong style="font-size:1.02rem">' +
            n.title +
            '</strong><p class="text-muted" style="margin:0.4rem 0 0;font-size:0.92rem;line-height:1.5">' +
            (n.body || '') +
            '</p></div>' +
            '<time datetime="' +
            n.at +
            '">' +
            formatDate(n.at) +
            '</time></article>'
          );
        })
        .join('');
    });
  </script>
</body>
</html>
