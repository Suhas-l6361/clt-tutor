service: CRM-Files
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1
  memorySize: 1024
  timeout: 30
  versionFunctions: false
  deploymentBucket:
    maxPreviousDeploymentArtifacts: 1
  environment:
    JWT_SECRET: ${env:JWT_SECRET, ''}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - lambda:InvokeFunction
        - logs:CreateLogGroup
        - logs:CreateLogStream
        - logs:PutLogEvents
      Resource: "*"
    - Effect: Allow
      Action:
        - s3:PutObject
        - s3:GetObject
        - s3:DeleteObject
        - s3:ListBucket
        - s3:HeadObject
      Resource:
        - arn:aws:s3:::clututor-onlinetest-queations
        - arn:aws:s3:::clututor-onlinetest-queations/*
        - arn:aws:s3:::clututor-onlinetest-keyanswer
        - arn:aws:s3:::clututor-onlinetest-keyanswer/*
        - arn:aws:s3:::previous-year-queation-paper
        - arn:aws:s3:::previous-year-queation-paper/*
        - arn:aws:s3:::clatutor-course-video
        - arn:aws:s3:::clatutor-course-video/*
    - Effect: Allow
      Action:
        - s3:ListBucket
      Resource:
        - arn:aws:s3:::clatutor-email-replies-596451157754
    - Effect: Allow
      Action:
        - s3:GetObject
        - s3:PutObject
        - s3:DeleteObject
        - s3:HeadObject
      Resource:
        - arn:aws:s3:::clatutor-email-replies-596451157754/*
    - Effect: Allow
      Action:
        - ses:SendEmail
        - ses:SendRawEmail
      Resource: "*"

functions:
  addTest:
    handler: addTest.handler
    events:
      - http:
          path: add_test
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  requestCallback:
    handler: requestCallback.handler
    events:
      - http:
          path: requestCallback
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  enrollrequest:
    handler: enrollrequest.handler
    events:
      - http:
          path: enrollrequest
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  contactUs:
    handler: contactUs.handler
    events:
      - http:
          path: contactUs
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  fees:
    handler: fees.handler
    events:
      - http:
          path: fees
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  attendance:
    handler: attendance.handler
    events:
      - http:
          path: attendance
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  downloadAnswer:
    handler: downloadAnswer.handler
    events:
      - http:
          path: downloadAnswer
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  testSubmit:
    handler: testSubmit.handler
    events:
      - http:
          path: submit_online_test
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  scanOmr:
    handler: .build/scanOmr/handler.handler
    timeout: 29
    memorySize: 1024
    package:
      patterns:
        - '!**'
        - '.build/scanOmr/handler.cjs'
    events:
      - http:
          path: scan_omr
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  previousYrQueationPap:
    handler: previous_yr_queation_pap.handler
    events:
      - http:
          path: previous_queation_paper
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  courseVideo:
    handler: courseVideo.handler
    events:
      - http:
          path: course_video
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  courseView:
    handler: courseView.handler
    events:
      - http:
          path: course_view
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

  emailInbox:
    handler: .build/emailInbox/handler.handler
    package:
      patterns:
        - '!**'
        - '.build/emailInbox/handler.cjs'
    events:
      - http:
          path: email_inbox
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

resources:
  Resources:
    GatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Requested-With'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'OPTIONS,GET,POST,PUT,DELETE'"
        ResponseType: DEFAULT_4XX
        RestApiId:
          Ref: ApiGatewayRestApi
    GatewayResponseDefault5XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Requested-With'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'OPTIONS,GET,POST,PUT,DELETE'"
        ResponseType: DEFAULT_5XX
        RestApiId:
          Ref: ApiGatewayRestApi

plugins: ${file(./serverless-plugins.cjs)}

package:
  individually: true
  excludeDevDependencies: true
  patterns:
    - '!**/.git/**'
    - '!**/.serverless/**'
    - '!**/.vscode/**'
    - '!**/.env'
    - '!**/.env.*'
    - '!**/README.md'
    - '!**/*.md'
    - '!**/package-lock.json'
    - '!**/yarn.lock'
    - '!**/.DS_Store'
    - '!**/test/**'
    - '!**/tests/**'
    - '!**/__tests__/**'
    - '!**/.gitignore'
    - '!**/.npmignore'
    - '!scripts/**'
    - '!scanOmr.entry.js'
    - '!lib/**'
    - '!vendor/**'
    - '!.build/**'
    - '!node_modules/@types/**'
    - '!node_modules/@aws-sdk/**'
    - '!node_modules/@smithy/**'
    - '!node_modules/@aws-crypto/**'
    - '!node_modules/esbuild/**'
    - '!node_modules/jimp/**'
    - '!node_modules/@jimp/**'
    - '!node_modules/serverless-python-requirements/**'
    - '!node_modules/**/*.d.ts'
    - '!node_modules/**/*.map'
    - '!node_modules/**/test/**'
    - '!node_modules/**/tests/**'
    - '!node_modules/**/__tests__/**'
    - '!node_modules/**/docs/**'
    - '!node_modules/**/doc/**'
    - '!node_modules/**/example/**'
    - '!node_modules/**/examples/**'
    - '!node_modules/**/.github/**'
    - '!node_modules/serverless/**'
    - '!node_modules/serverless-offline/**'
    - '!node_modules/aws-sdk/dist/**'
    - '!node_modules/aws-sdk/dist-tools/**'
    - '!node_modules/aws-sdk/scripts/**'
    - '!node_modules/aws-sdk/doc/**'
